<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Etternelle</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BACKGROUND */
        body {
            height: 100vh;
            background: linear-gradient(135deg, #fff7e6, #f5e6c8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Playfair Display", serif;
        }

        /* LOGO */
        .logo {
            font-family: "Great Vibes", cursive;
            font-size: 4.5rem;
            color: #000;
            text-align: center;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #d4a762, #f7d9a6, #d4a762);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 12px rgba(212, 167, 98, 0.4);
        }

        /* BUTTON */
        .start-button {
            margin-top: 40px;
            padding: 15px 45px;
            font-size: 1.4rem;
            text-decoration: none;
            color: #000;
            border: 2px solid #d4a762;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(6px);
            transition: 0.3s;
        }

        .start-button:hover {
            background: linear-gradient(90deg, #d4a762, #f7d9a6, #d4a762);
            color: white;
            box-shadow: 0 0 15px rgba(212, 167, 98, 0.8);
        }
    </style>
</head>

<body>

    <h1 class="logo">Atelier Etternelle</h1>

    <a href="city.html" class="start-button">Let’s Glow Up</a>

</body>
</html>
