<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Box</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f3d9ff, #f7e7ff);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .back-arrow {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: #d8b4fe;
            text-shadow: 0 0 10px rgba(216,180,254,0.7);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #d8b4fe;
            text-shadow: 0 0 12px rgba(216,180,254,0.6);
        }

        .routine-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .routine-btn {
            flex: 1;
            background: #d8b4fe;
            color: black;
            padding: 12px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .routine-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(216,180,254,0.6);
        }

        .exercise-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .exercise-card {
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 18px;
            padding: 20px;
            color: #d8b4fe;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .exercise-title {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .exercise-desc {
            font-size: 1rem;
            opacity: 0.9;
        }

        .start-btn {
            margin-top: 30px;
            background: #d8b4fe;
            color: black;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(216,180,254,0.6);
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Workout Box</h1>

    <div class="routine-container">
        <button class="routine-btn" onclick="loadRoutine('beginner')">Beginner</button>
        <button class="routine-btn" onclick="loadRoutine('intermediate')">Intermediate</button>
        <button class="routine-btn" onclick="loadRoutine('advanced')">Advanced</button>
    </div>

    <div id="exerciseList" class="exercise-container"></div>

    <button class="start-btn" onclick="alert('Your workout is starting! 💜')">Start Workout</button>

<script>
    const routines = {
        beginner: [
            { icon: "🏋️‍♀️", title: "Bodyweight Squats", desc: "Strengthens legs + glutes. 12 reps." },
            { icon: "🤸‍♀️", title: "Plank", desc: "Core stability. Hold for 20 seconds." },
            { icon: "🚶‍♀️", title: "March in Place", desc: "Light cardio warm-up. 30 seconds." }
        ],
        intermediate: [
            { icon: "🦵", title: "Lunges", desc: "Targets legs + balance. 10 reps each side." },
            { icon: "💪", title: "Push-ups", desc: "Upper body strength. 10 reps." },
            { icon: "🔥", title: "Mountain Climbers", desc: "Cardio + core. 25 seconds." }
        ],
        advanced: [
            { icon: "🏃‍♀️", title: "Burpees", desc: "Full-body explosive movement. 12 reps." },
            { icon: "🦿", title: "Jump Squats", desc: "Power legs workout. 15 reps." },
            { icon: "⏱️", title: "Plank to Push-up", desc: "Core + arms. 12 reps." }
        ]
    };

    function loadRoutine(level) {
        const container = document.getElementById("exerciseList");
        container.innerHTML = "";

        routines[level].forEach(ex => {
            container.innerHTML += `
                <div class="exercise-card">
                    <div class="exercise-title">${ex.icon} ${ex.title}</div>
                    <div class="exercise-desc">${ex.desc}</div>
                </div>
            `;
        });
    }
</script>

</body>
</html>
