<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Workout Area</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#e8e2ff,#c7c9ff,#a9afff);
  padding:20px;
  color:#1a1a2e;
}
h1{ text-align:center; margin-bottom:20px; }

/* Level buttons */
.levels{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}
.level{
  padding:10px 16px;
  background:rgba(255,255,255,0.6);
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 0 8px rgba(255,255,255,0.7);
}
.level:hover{
  background:white;
}

/* Exercise list */
#exerciseBox{
  max-width:500px;
  margin:0 auto 25px;
  padding:15px;
  background:rgba(255,255,255,0.7);
  border-radius:12px;
  display:none;
  box-shadow:0 0 10px rgba(255,255,255,0.8);
}

/* Timer */
.timer{
  max-width:300px;
  margin:0 auto 25px;
  padding:15px;
  background:rgba(255,255,255,0.7);
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 10px rgba(255,255,255,0.8);
}
.timer button{
  margin:5px;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* Calendar */
.calendar{
  max-width:500px;
  margin:0 auto;
  padding:15px;
  background:rgba(255,255,255,0.7);
  border-radius:12px;
  box-shadow:0 0 10px rgba(255,255,255,0.8);
}
.day{
  padding:8px;
  margin:5px 0;
  background:white;
  border-radius:8px;
  cursor:pointer;
}
.day:hover{ background:#f0f0ff; }

/* Modal */
#modal{
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:260px;
}
</style>
</head>
<body>

<h1>Workout Area</h1>

<!-- LEVELS -->
<div class="levels" id="levelButtons"></div>

<!-- EXERCISES -->
<div id="exerciseBox">
  <h3>Exercises</h3>
  <ul id="exerciseList"></ul>
</div>

<!-- TIMER -->
<div class="timer">
  <h3 id="time">00:00</h3>
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<!-- SIMPLE CALENDAR -->
<div class="calendar" id="calendar"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h3>Add Workout</h3>
    <label>Exercise:</label>
    <input id="modalExercise" style="width:100%;margin-bottom:8px;">
    <label>Minutes:</label>
    <input id="modalMinutes" type="number" style="width:100%;margin-bottom:12px;">
    <button onclick="saveWorkout()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
// LEVELS + EXERCISES
const levels={
  "Beginner":["Squats","Wall Push-ups","Glute Bridges"],
  "Intermediate":["Lunges","Push-ups","Plank"],
  "Advanced":["Burpees","Jump Squats","Pike Push-ups"],
  "Strength":["Dumbbell Squats","Rows","Deadlifts"],
  "Cardio":["Jump Rope","High Knees","Skaters"],
  "Flexibility":["Hamstring Stretch","Cobra","Child’s Pose"]
};

// Build level buttons
const levelButtons=document.getElementById("levelButtons");
for(let lvl in levels){
  const btn=document.createElement("div");
  btn.className="level";
  btn.textContent=lvl;
  btn.onclick=()=>showExercises(lvl);
  levelButtons.appendChild(btn);
}

// Show exercises
function showExercises(level){
  const box=document.getElementById("exerciseBox");
  const list=document.getElementById("exerciseList");
  list.innerHTML="";
  levels[level].forEach(ex=>{
    const li=document.createElement("li");
    li.textContent=ex;
    list.appendChild(li);
  });
  box.style.display="block";
}

// TIMER
let sec=0, timer=null;
function updateTime(){
  let m=String(Math.floor(sec/60)).padStart(2,"0");
  let s=String(sec%60).padStart(2,"0");
  document.getElementById("time").textContent=`${m}:${s}`;
}
function startTimer(){
  if(timer) return;
  timer=setInterval(()=>{sec++;updateTime();},1000);
}
function pauseTimer(){ clearInterval(timer); timer=null; }
function resetTimer(){ pauseTimer(); sec=0; updateTime(); }

// SIMPLE CALENDAR
const calendar=document.getElementById("calendar");
for(let i=1;i<=7;i++){
  const d=document.createElement("div");
  d.className="day";
  d.textContent="Day "+i;
  d.onclick=()=>openModal(i);
  calendar.appendChild(d);
}

// MODAL
let currentDay=null;
function openModal(day){
  currentDay=day;
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}
function saveWorkout(){
  alert("Saved workout for Day "+currentDay);
  closeModal();
}
</script>

</body>
</html>
