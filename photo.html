<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        min-height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #dfe3ea, #c9ced8, #e8ecf2);
        font-family: "Playfair Display", serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 0 40px;
    }

    .back-arrow {
        position: fixed;
        top: 18px;
        left: 18px;
        font-size: 2.1rem;
        cursor: pointer;
        color: #ffffff;
        text-shadow: 0 0 12px rgba(255,255,255,0.7);
        z-index: 10;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 18px;
        color: #ffffff;
        text-shadow: 0 0 14px rgba(255,255,255,0.8);
    }

    /* Aesthetic selector */
    .aesthetic-grid {
        width: 92%;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
    }

    .aesthetic-card {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(8px);
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 16px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .aesthetic-card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 14px rgba(255,255,255,0.6);
    }

    .icon {
        font-size: 1.8rem;
        margin-bottom: 6px;
        display: inline-block;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
    }

    /* Glossy gold heart */
    .heart {
        color: #f5d487;
        text-shadow: 0 0 6px rgba(245,212,135,0.8);
    }

    /* Glossy blue star */
    .star {
        color: #7ab4ff;
        text-shadow: 0 0 6px rgba(122,180,255,0.8);
    }

    .aesthetic-name {
        color: #ffffff;
        font-size: 1rem;
        text-shadow: 0 0 8px rgba(255,255,255,0.7);
    }

    /* Pose type dropdown */
    .pose-select {
        width: 90%;
        max-width: 700px;
        background: rgba(255,255,255,0.25);
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 16px;
        padding: 10px 14px;
        color: #ffffff;
        margin-bottom: 16px;
        font-size: 1rem;
        backdrop-filter: blur(8px);
    }

    .pose-select select {
        width: 100%;
        background: transparent;
        border: none;
        color: #ffffff;
        font-size: 1rem;
        outline: none;
    }

    /* Button */
    .show-btn {
        background: #ffffff;
        color: #4a4a4a;
        padding: 12px 18px;
        border-radius: 16px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: 0.2s ease;
        box-shadow: 0 0 12px rgba(255,255,255,0.7);
        margin-bottom: 20px;
    }

    .show-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255,255,255,0.9);
    }

    /* Results */
    .results {
        width: 94%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
    }

    .result-card {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 18px;
        padding: 14px 16px;
        color: #ffffff;
        font-size: 1rem;
        text-shadow: 0 0 6px rgba(255,255,255,0.6);
    }

    .result-card h2 {
        font-size: 1.3rem;
        margin-bottom: 8px;
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255,255,255,0.9);
    }

    .bullet {
        margin-left: 14px;
        margin-bottom: 6px;
        font-size: 0.95rem;
    }
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Photo Ideas</h1>

<!-- Aesthetic selector -->
<div class="aesthetic-grid" id="aestheticGrid">
    <!-- JS will fill this -->
</div>

<!-- Pose type -->
<div class="pose-select">
    <select id="poseType">
        <option disabled selected>Select Pose Type</option>
        <option>Face Poses</option>
        <option>Full Body</option>
        <option>Sitting</option>
        <option>Mirror</option>
        <option>Editorial</option>
    </select>
</div>
