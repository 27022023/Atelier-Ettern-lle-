<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Ideas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        min-height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #dfe3ea, #c9ced8, #e8ecf2);
        font-family: "Playfair Display", serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 0 40px;
    }

    .back-arrow {
        position: fixed;
        top: 18px;
        left: 18px;
        font-size: 2.1rem;
        cursor: pointer;
        color: #ffffff;
        text-shadow: 0 0 12px rgba(255,255,255,0.7);
        z-index: 10;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 18px;
        color: #ffffff;
        text-shadow: 0 0 14px rgba(255,255,255,0.8);
    }

    /* Aesthetic selector */
    .aesthetic-grid {
        width: 92%;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
    }

    .aesthetic-card {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(8px);
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 16px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .aesthetic-card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 14px rgba(255,255,255,0.6);
    }

    .icon {
        font-size: 1.8rem;
        margin-bottom: 6px;
        display: inline-block;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
    }

    /* Glossy gold heart */
    .heart {
        color: #f5d487;
        text-shadow: 0 0 6px rgba(245,212,135,0.8);
    }

    /* Glossy blue star */
    .star {
        color: #7ab4ff;
        text-shadow: 0 0 6px rgba(122,180,255,0.8);
    }

    .aesthetic-name {
        color: #ffffff;
        font-size: 1rem;
        text-shadow: 0 0 8px rgba(255,255,255,0.7);
    }

    /* Pose type dropdown */
    .pose-select {
        width: 90%;
        max-width: 700px;
        background: rgba(255,255,255,0.25);
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 16px;
        padding: 10px 14px;
        color: #ffffff;
        margin-bottom: 16px;
        font-size: 1rem;
        backdrop-filter: blur(8px);
    }

    .pose-select select {
        width: 100%;
        background: transparent;
        border: none;
        color: #ffffff;
        font-size: 1rem;
        outline: none;
    }

    /* Button */
    .show-btn {
        background: #ffffff;
        color: #4a4a4a;
        padding: 12px 18px;
        border-radius: 16px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: 0.2s ease;
        box-shadow: 0 0 12px rgba(255,255,255,0.7);
        margin-bottom: 20px;
    }

    .show-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(255,255,255,0.9);
    }

    /* Results */
    .results {
        width: 94%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
    }

    .result-card {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 18px;
        padding: 14px 16px;
        color: #ffffff;
        font-size: 1rem;
        text-shadow: 0 0 6px rgba(255,255,255,0.6);
    }

    .result-card h2 {
        font-size: 1.3rem;
        margin-bottom: 8px;
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255,255,255,0.9);
    }

    .bullet {
        margin-left: 14px;
        margin-bottom: 6px;
        font-size: 0.95rem;
    }
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Photo Ideas</h1>

<!-- Aesthetic selector -->
<div class="aesthetic-grid" id="aestheticGrid"></div>

<!-- Pose type -->
<div class="pose-select">
    <select id="poseType">
        <option disabled selected>Select Pose Type</option>
        <option>Face Poses</option>
        <option>Full Body</option>
        <option>Sitting</option>
        <option>Mirror</option>
        <option>Editorial</option>
    </select>
</div>

<button class="show-btn" onclick="showPhotoIdeas()">Show Ideas</button>

<div class="results">
    <div class="result-card" id="poseCard"></div>
    <div class="result-card" id="tipsCard"></div>
</div>

<script>
/* ------------------ AESTHETICS ------------------ */
const aesthetics = [
    { name: "Coquette", icon: "❤️", type: "soft" },
    { name: "Soft Girl", icon: "❤️", type: "soft" },
    { name: "Balletcore", icon: "❤️", type: "soft" },
    { name: "Vanilla Girl", icon: "❤️", type: "soft" },
    { name: "Angelcore", icon: "❤️", type: "soft" },

    { name: "Glam", icon: "⭐", type: "bold" },
    { name: "Baddie", icon: "⭐", type: "bold" },
    { name: "Model Off-Duty", icon: "⭐", type: "bold" },
    { name: "Dark Feminine", icon: "⭐", type: "bold" },
    { name: "Y2K", icon: "⭐", type: "bold" }
];

let selectedAesthetic = null;

/* ------------------ LOAD AESTHETIC CARDS ------------------ */
function loadAestheticCards() {
    const grid = document.getElementById("aestheticGrid");
    grid.innerHTML = "";

    aesthetics.forEach(a => {
        const card = document.createElement("div");
        card.classList.add("aesthetic-card");

        const iconClass = a.type === "soft" ? "heart" : "star";

        card.innerHTML = `
            <div class="icon ${iconClass}">${a.icon}</div>
            <div class="aesthetic-name">${a.name}</div>
        `;

        card.onclick = () => {
            selectedAesthetic = a.name;

            document.querySelectorAll(".aesthetic-card").forEach(c => {
                c.style.borderColor = "rgba(255,255,255,0.4)";
                c.style.boxShadow = "none";
            });

            card.style.borderColor = "#ffffff";
            card.style.boxShadow = "0 0 14px rgba(255,255,255,0.8)";
        };

        grid.appendChild(card);
    });
}

loadAestheticCards();

/* ------------------ POSE DATABASE (10 EACH) ------------------ */
const poseIdeas = {
    "Coquette": [
        "Soft smile with chin slightly down",
        "Hand gently touching cheek",
        "Looking over shoulder with soft eyes",
        "Holding a ribbon or bow near face",
        "Sitting with knees together and tilted head",
        "Mirror selfie with soft flash",
        "Hands clasped under chin",
        "Side profile with dreamy gaze",
        "Holding flowers near face",
        "Soft back-arch pose"
    ],

    "Soft Girl": [
        "Peace sign selfie",
        "Soft pout with glossy lips",
        "Hand on cheek with tilted head",
        "Mirror selfie with pastel outfit",
        "Sitting cross‑legged on bed",
        "Looking down with soft smile",
        "Holding phone with both hands",
        "Hair tucked behind ear",
        "Candid laugh pose",
        "Soft flash selfie"
    ],

    "Balletcore": [
        "Arms in soft ballet first position",
        "Leg extended behind lightly",

        "Profile pose with elongated neck",

    ],

    "Vanilla Girl": [

        "Minimalist standing pose",
        "Walking shot with tote bag",

        "Holding book close to chest"
    ],

    "Angelcore": [
        "Hands together like prayer",
        "Soft upward gaze",
        "Backlit halo‑light pose",
        "Holding white flowers",
        "Sitting with legs tucked in",
        "Mirror selfie with white outfit",
        "Soft hair‑touch pose",
        "Side profile with glow",
        "Hands near face like wings",
        "Lying down with soft light"
    ],

    "Glam": [
        "Strong jawline angle",
        "Hand on hip with confidence",
        "Over‑the‑shoulder smolder",
        "Mirror selfie with flash",
        "Full‑body red carpet stance",
        "Hair flip motion shot",
        "Leg‑cross sitting pose",
        "Holding clutch or jewelry",
        "Bold chin‑up pose",
        "Side profile with sharp light"
    ],

    "Baddie": [
        "Phone covering face mirror pose",
        "Tongue‑out playful pose",

        "Low mirror angle",

        "Side profile with slick hair",

    ],

    "Model Off-Duty": [

    "Dark Feminine": [

    ],

    "Y2K": [
        "Peace sign mirror selfie",
        "Tongue out with flash",

        "Bubblegum blowing pose",

        "Phone sticker mirror selfie",

        "Hair clips pose",
        "Glossy lips close‑up"
    ]
};

/* ------------------ LIGHTING + BACKGROUND ------------------ */
const lightingIdeas = {
    soft: [
        "Soft window light",
        "Warm morning glow",
        "Cloudy daylight",
        "Soft flash",
        "Golden hour"
    ],
    bold: [
        "Direct flash",
        "Strong side lighting",
        "Neon lights",
        "Shadow contrast",
        "Backlit glow"
    ]
};

const backgroundIdeas = {
    soft: [
        "White bedding",
        "Pastel walls",
        "Curtains",
        "Flower field",
        "Cozy room"
    ],
    bold: [
        "Street at night",
        "Parking garage",
        "Neon signs",
        "Dark room",
        "Metallic surfaces"
    ]
};

/* ------------------ SHOW IDEAS ------------------ */
function showPhotoIdeas() {
    const poseType = document.getElementById("poseType").value;
    const poseCard = document.getElementById("poseCard");
    const tipsCard = document.getElementById("tipsCard");

    if (!selectedAesthetic || !poseType) {
        poseCard.innerHTML = `<h2>Poses</h2><div class="bullet">• Please select an aesthetic and pose type.</div>`;
        tipsCard.innerHTML = `<h2>Tips</h2><div class="bullet">• No tips available.</div>`;
        return;
    }

    const poses = poseIdeas[selectedAesthetic];
    const aestheticType = aesthetics.find(a => a.name === selectedAesthetic).type;

    const lighting = lightingIdeas[aestheticType];
    const backgrounds = backgroundIdeas[aestheticType];

    poseCard.innerHTML = `
        <h2>${selectedAesthetic} Poses</h2>
        ${poses.map(p => `<div class="bullet">• ${p}</div>`).join("")}
    `;

    tipsCard.innerHTML = `
        <h2>Tips</h2>
        <div class="bullet"><strong>Lighting:</strong> ${lighting.join(", ")}</div>
        <div class="bullet"><strong>Backgrounds:</strong> ${backgrounds.join(", ")}</div>
    `;
}
</script>

</body>
</html>
