<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Ideas</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f8c8d8, #f7e7c9);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        /* Back arrow */
        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: gold;
            text-shadow: 0 0 10px rgba(255,215,0,0.7);
        }

        /* Title */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: gold;
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
        }

        /* Input box */
        .input-box {
            width: 85%;
            max-width: 600px;
            background: black;
            border: 2px solid gold;
            border-radius: 14px;
            padding: 12px;
            color: gold;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: gold;
            font-size: 1.2rem;
            outline: none;
        }

        /* Button */
        .idea-btn {
            background: gold;
            color: black;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .idea-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.6);
        }

        /* Results box */
        .results {
            margin-top: 30px;
            width: 85%;
            max-width: 600px;
            background: black;
            border: 2px solid gold;
            border-radius: 18px;
            padding: 20px;
            color: gold;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Photo Ideas</h1>

    <div class="input-box">
        <input id="vibeInput" type="text" placeholder="What’s your vibe today? (e.g. classy, soft girl, sporty)">
    </div>

    <button class="idea-btn" onclick="showIdeas()">Show photo ideas</button>

    <div id="resultsBox" class="results">
        <h2 style="margin-bottom: 10px;">Your Photo Inspiration</h2>
        <p id="resultsText">Your pose ideas, locations, and concepts will appear here!</p>
    </div>

<script>
    function showIdeas() {
        const vibe = document.getElementById("vibeInput").value;
        const resultsBox = document.getElementById("resultsBox");
        const resultsText = document.getElementById("resultsText");

        if (!vibe) {
            resultsText.textContent = "Please enter your vibe first!";
        } else {
            resultsText.textContent = 
                "Here are pose ideas, locations, and concepts for a " + vibe.toLowerCase() + " vibe! (Ideas will go here)";
        }

        resultsBox.style.display = "block";
    }
</script>

</body>
</html>
