<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Photo Ideas</title>
<link rel="icon" type="image/png" href="icon_1772911913761.png">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        min-height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #dfe3ea, #c9ced8, #e8ecf2);
        font-family: "Playfair Display", serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 0 40px;
        color: #000 !important;
    }

    .back-arrow {
        position: fixed;
        top: 18px;
        left: 18px;
        font-size: 2.1rem;
        cursor: pointer;
        color: #000 !important;
        text-shadow: none !important;
        z-index: 10;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 18px;
        color: #000 !important;
        text-shadow: none !important;
    }

    .aesthetic-grid {
        width: 92%;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
    }

    .aesthetic-card {
        background: rgba(255,255,255,0.35);
        backdrop-filter: blur(8px);
        border: 2px solid rgba(0,0,0,0.25);
        border-radius: 16px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .aesthetic-card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 14px rgba(0,0,0,0.25);
    }

    .icon {
        font-size: 1.8rem;
        margin-bottom: 6px;
        display: inline-block;
        color: #ffffff !important;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.6));
    }

    .aesthetic-name {
        color: #000 !important;
        font-size: 1rem;
        text-shadow: none !important;
    }

    .pose-select {
        width: 90%;
        max-width: 700px;
        background: rgba(255,255,255,0.35);
        border: 2px solid rgba(0,0,0,0.25);
        border-radius: 16px;
        padding: 10px 14px;
        color: #000 !important;
        margin-bottom: 16px;
        backdrop-filter: blur(8px);
    }

    .pose-select select {
        width: 100%;
        background: transparent;
        border: none;
        color: #000 !important;
        font-size: 1rem;
        outline: none;
    }

    .show-btn {
        background: #ffffff;
        color: #000;
        padding: 12px 18px;
        border-radius: 16px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        border: 2px solid rgba(0,0,0,0.25);
        transition: 0.2s ease;
        margin-bottom: 20px;
    }

    .show-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0,0,0,0.25);
    }

    .results {
        width: 94%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
    }

    .result-card {
        background: rgba(255,255,255,0.35);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(0,0,0,0.25);
        border-radius: 18px;
        padding: 14px 16px;
        color: #000 !important;
        font-size: 1rem;
        text-shadow: none !important;
    }

    .result-card h2 {
        font-size: 1.3rem;
        margin-bottom: 8px;
        color: #000 !important;
        text-shadow: none !important;
    }

    .bullet {
        margin-left: 14px;
        margin-bottom: 6px;
        font-size: 0.95rem;
        color: #000 !important;
    }
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Photo Ideas</h1>

<div class="aesthetic-grid" id="aestheticGrid"></div>

<div class="pose-select">
    <select id="poseType">
        <option disabled selected>Select Pose Type</option>
        <option>Face Poses</option>
        <option>Full Body</option>
        <option>Sitting</option>
        <option>Mirror</option>
        <option>Editorial</option>
    </select>
</div>

<button class="show-btn" onclick="showPhotoIdeas()">Show Ideas</button>

<div class="results">
    <div class="result-card" id="poseCard"></div>
    <div class="result-card" id="tipsCard"></div>
</div>

    { name: "Soft Girl", icon: "❤️", type: "soft" },
    { name: "Balletcore", icon: "❤️", type: "soft" },
    { name: "Vanilla Girl", icon: "❤️", type: "soft" },
    { name: "Angelcore", icon: "❤️", type: "soft" },

    { name: "Glam", icon: "⭐", type: "bold" },
    { name: "Baddie", icon: "⭐", type: "bold" },
    { name: "Model Off-Duty", icon: "⭐", type: "bold" },
    { name: "Dark Feminine", icon: "⭐", type: "bold" },
    { name: "Y2K", icon: "⭐", type: "bold" }
];

let selectedAesthetic = null;

function loadAestheticCards() {
    const grid = document.getElementById("aestheticGrid");
    grid.innerHTML = "";

    aesthetics.forEach(a => {
        const card = document.createElement("div");
        card.classList.add("aesthetic-card");

        card.innerHTML = `
            <div class="icon">${a.icon}</div>
            <div class="aesthetic-name">${a.name}</div>
        `;

        card.onclick = () => {
            selectedAesthetic = a.name;

            document.querySelectorAll(".aesthetic-card").forEach(c => {
                c.style.borderColor = "rgba(0,0,0,0.25)";
                c.style.boxShadow = "none";
            });

            card.style.borderColor = "#000";
            card.style.boxShadow = "0 0 14px rgba(0,0,0,0.25)";
        };

        grid.appendChild(card);
    });
}

loadAestheticCards();

function showPhotoIdeas() {
    const poseType = document.getElementById("poseType").value;
    const poseCard = document.getElementById("poseCard");
    const tipsCard = document.getElementById("tipsCard");

    if (!selectedAesthetic || !poseType) {
        poseCard.innerHTML = `<h2>Poses</h2><div class="bullet">• Please select an aesthetic and pose type.</div>`;
        tipsCard.innerHTML = `<h2>Tips</h2><div class="bullet">• No tips available.</div>`;
        return;
    }

    const poses = poseIdeas[selectedAesthetic];
    const aestheticType = aesthetics.find(a => a.name === selectedAesthetic).type;

    const lighting = lightingIdeas[aestheticType];
    const backgrounds = backgroundIdeas[aestheticType];

    poseCard.innerHTML = `
        <h2>${selectedAesthetic} Poses</h2>
        ${poses.map(p => `<div class="bullet">• ${p}</div>`).join("")}
    `;

    tipsCard.innerHTML = `
        <h2>Tips</h2>
        <div class="bullet"><strong>Lighting:</strong> ${lighting.join(", ")}</div>
        <div class="bullet"><strong>Backgrounds:</strong> ${backgrounds.join(", ")}</div>
    `;
}
