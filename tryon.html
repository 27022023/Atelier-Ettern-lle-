<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Mirror</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#f7e7c9;
      font-family:Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
    }

    .mirror{
      width:360px;
      height:360px;
      border-radius:50%;
      padding:12px;
      background:radial-gradient(circle,#fff7e0,#f4c76c);
      box-shadow:0 0 25px rgba(0,0,0,0.25), inset 0 0 12px rgba(255,255,255,0.9);
    }

    .mirror-inner{
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      position:relative;
      background:#000;
      will-change:transform;
      backface-visibility:hidden;
    }

    video{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    canvas{
      position:absolute;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .controls{
      margin-top:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    button{
      padding:8px 14px;
      border:none;
      border-radius:20px;
      background:#000;
      color:#fff;
      cursor:pointer;
    }
  </style>
</head>
<body>

  <div class="mirror">
    <div class="mirror-inner">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div class="controls">
    <button onclick="setMakeup('clean')">Clean</button>
    <button onclick="setMakeup('soft')">Soft Glam</button>
    <button onclick="setMakeup('bold')">Bold</button>
    <button onclick="setMakeup(null)">Clear</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    let faceLandmarker = null;
    let lastVideoTime = -1;
    let makeupMode = null;

    function setMakeup(mode){
      makeupMode = mode;
    }

    function resizeCanvas(){
      const rect = video.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);

    async function initAI(){
      const {FaceLandmarker, FilesetResolver} = vision;
      const fileset = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
      );

      faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
        },
        runningMode: "VIDEO",
        numFaces: 1
      });
    }

    async function startCamera(){
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"user"},
        audio:false
      });
      video.srcObject = stream;

      video.onloadedmetadata = () => {
        resizeCanvas();
        video.play();
        requestAnimationFrame(loop);
      };
    }

    function drawPolygon(points, color, alpha=1){
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for(let i=1;i<points.length;i++){
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    async function loop(){
      if(!faceLandmarker){
        requestAnimationFrame(loop);
        return;
      }

      if(video.readyState < 2){
        requestAnimationFrame(loop);
        return;
      }

      const now = performance.now();
      const videoTime = video.currentTime;

      if(videoTime === lastVideoTime){
        requestAnimationFrame(loop);
        return;
      }
      lastVideoTime = videoTime;

      ctx.clearRect(0,0,canvas.width,canvas.height);

      const results = faceLandmarker.detectForVideo(video, now);
      if(!results.faceLandmarks || results.faceLandmarks.length === 0){
        requestAnimationFrame(loop);
        return;
      }

      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);

      const lm = results.faceLandmarks[0];
      const p = i => ({x: lm[i].x * w, y: lm[i].y * h});

      if(makeupMode){
        const lips = [61,146,91,181,84,17,314,405,321,375,291,308].map(p);

        if(makeupMode === "clean"){
          drawPolygon(lips,"rgba(255,180,180,1)",0.5);
        }

        if(makeupMode === "soft"){
          drawPolygon(lips,"rgba(200,80,120,1)",0.6);
        }

        if(makeupMode === "bold"){
          drawPolygon(lips,"rgba(160,40,60,1)",0.8);
        }
      }

      requestAnimationFrame(loop);
    }

    (async () => {
      await initAI();
      await startCamera();
    })();
  </script>

</body>
</html>
