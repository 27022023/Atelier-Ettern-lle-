<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beauty Mirror</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #111;
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 30px 10px;
        }

        .app {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #f7e7b8;
        }

        .mirror-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3 / 4;
            margin: 0 auto;
            border-radius: 30px;
            padding: 8px;
            background: radial-gradient(circle at top, #f7e7b8, #d9b56f, #5a3b12);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        video {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
            background: #000;
        }

        #hairColorLayer,
        #haircutOverlay,
        #labelOverlay {
            position: absolute;
            left: 8px;
            top: 8px;
            width: calc(100% - 16px);
            height: calc(100% - 16px);
            pointer-events: none;
            border-radius: 24px;
        }

        #hairColorLayer {
            mix-blend-mode: soft-light;
            z-index: 2;
        }

        #haircutOverlay {
            z-index: 3;
            border: 3px solid transparent;
        }

        #labelOverlay {
            z-index: 4;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 10px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .filters {
            text-align: center;
            margin: 15px 0 10px;
        }

        .filters h3 {
            margin-bottom: 10px;
            color: #f7e7b8;
        }

        .filters .filter-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filters button {
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            background: #333;
            color: #f5f5f5;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .filters button:hover {
            background: #555;
            transform: translateY(-2px);
        }

        .beauty-section {
            width: 100%;
            text-align: center;
            margin-top: 25px;
        }

        .beauty-section h3 {
            font-size: 20px;
            margin: 25px 0 15px;
            color: #d4af37;
            font-weight: 600;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px; /* wide spacing */
            margin-bottom: 35px;
        }

        .button-row button {
            padding: 14px 26px;
            border-radius: 16px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: black; /* readable */
            background: linear-gradient(to bottom, #f8e7b8, #d9b56f);
            box-shadow: 0 4px 8px rgba(0,0,0,0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease, outline 0.15s ease;
            outline: 2px solid transparent;
            outline-offset: 2px;
        }

        .button-row button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.35);
        }

        .button-row button:active {
            transform: translateY(0);
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }

        .button-row button.active {
            outline: 2px solid #ffffff;
        }

        .error {
            text-align: center;
            color: #ffb3b3;
            margin-top: 10px;
            min-height: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>Beauty Mirror</h1>

    <div class="mirror-wrapper">
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <div id="hairColorLayer"></div>
            <div id="haircutOverlay"></div>
            <div id="labelOverlay"></div>
        </div>
    </div>

    <div class="error" id="errorMsg"></div>

    <div class="filters">
        <h3>Filters</h3>
        <div class="filter-row">
            <button data-filter="none">Original</button>
            <button data-filter="soft">Soft</button>
            <button data-filter="cool">Cool</button>
            <button data-filter="warm">Warm</button>
        </div>
    </div>

    <div class="beauty-section">

        <h3>Haircuts</h3>
        <div class="button-row" id="haircutRow">
            <button data-effect="haircut" data-value="Butterfly Cut">Butterfly Cut</button>
            <button data-effect="haircut" data-value="Wolf Cut">Wolf Cut</button>
            <button data-effect="haircut" data-value="Pixie Cut">Pixie Cut</button>
            <button data-effect="haircut" data-value="French Bob">French Bob</button>
            <button data-effect="haircut" data-value="Layers">Layers</button>
            <button data-effect="haircut" data-value="Curtain Bangs">Curtain Bangs</button>
            <button data-effect="haircut" data-value="Full Bangs">Full Bangs</button>
            <button data-effect="haircut" data-value="Less Bangs">Less Bangs</button>
            <button data-effect="haircut" data-value="Straight">Straight</button>
            <button data-effect="haircut" data-value="Curly">Curly</button>
        </div>

        <h3>Hair Color</h3>
        <div class="button-row" id="hairColorRow">
            <button data-effect="haircolor" data-value="brown">Brown</button>
            <button data-effect="haircolor" data-value="black">Black</button>
            <button data-effect="haircolor" data-value="blonde">Blonde</button>
            <button data-effect="haircolor" data-value="ginger">Ginger</button>
            <button data-effect="haircolor" data-value="red">More Ginger‑Red</button>
        </div>

        <h3>Makeup</h3>
        <div class="button-row" id="makeupRow">
            <button data-effect="makeup" data-value="clean">Clean Girl</button>
            <button data-effect="makeup" data-value="natural">Natural Makeup</button>
            <button data-effect="makeup" data-value="stargirl">Stargirl Makeup</button>
            <button data-effect="makeup" data-value="fashion">Fashion Icon Model</button>
            <button data-effect="makeup" data-value="bold">Bold Makeup</button>
            <button data-effect="makeup" data-value="oldmoney">Old Money Makeup</button>
            <button data-effect="makeup" data-value="french">French Makeup</button>
            <button data-effect="makeup" data-value="coquette">Coquette Makeup</button>
        </div>

    </div>
</div>

<script>
    const video = document.getElementById("video");
    const errorMsg = document.getElementById("errorMsg");
    const hairColorLayer = document.getElementById("hairColorLayer");
    const haircutOverlay = document.getElementById("haircutOverlay");
    const labelOverlay = document.getElementById("labelOverlay");

    let baseFilter = "none";
    let makeupFilter = "none";

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
            errorMsg.textContent = "";
        } catch (err) {
            console.error(err);
            errorMsg.textContent = "Camera access blocked or unavailable.";
        }
    }

    function updateVideoFilter() {
        if (makeupFilter === "none") {
            video.style.filter = baseFilter;
        } else if (baseFilter === "none") {
            video.style.filter = makeupFilter;
        } else {
            video.style.filter = baseFilter + " " + makeupFilter;
        }
    }

    // FILTER BUTTONS
    document.querySelectorAll(".filters button").forEach(btn => {
        btn.addEventListener("click", () => {
            const type = btn.dataset.filter;
            document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            if (type === "none") baseFilter = "none";
            if (type === "soft") baseFilter = "brightness(1.05) contrast(1.02)";
            if (type === "cool") baseFilter = "contrast(1.05) saturate(1.05) hue-rotate(-10deg)";
            if (type === "warm") baseFilter = "contrast(1.05) saturate(1.1) hue-rotate(10deg)";

            updateVideoFilter();
        });
    });

    // MAKEUP
    function applyMakeup(type) {
        const presets = {
            clean: "brightness(1.08) saturate(1.08)",
            natural: "brightness(1.05) contrast(1.05)",
            stargirl: "brightness(1.15) saturate(1.25)",
            fashion: "contrast(1.25) saturate(1.15)",
            bold: "contrast(1.35) saturate(1.35)",
            oldmoney: "brightness(0.96) contrast(1.12)",
            french: "contrast(1.18) saturate(1.08)",
            coquette: "brightness(1.12) saturate(1.2)"
        };
        makeupFilter = presets[type] || "none";
        updateVideoFilter();
    }

    // HAIR COLOR
    function applyHairColor(color) {
        const colors = {
            brown: "rgba(120, 72, 30, 0.35)",
            black: "rgba(20, 20, 20, 0.45)",
            blonde: "rgba(255, 220, 120, 0.35)",
            ginger: "rgba(200, 80, 20, 0.35)",
            red: "rgba(220, 40, 20, 0.35)"
        };
        hairColorLayer.style.background = colors[color] || "transparent";
    }

    // HAIRCUT (visual frame + label)
    function applyHaircut(styleName) {
        labelOverlay.textContent = styleName;
        haircutOverlay.style.borderColor = "#f7e7b8";

        if (styleName.toLowerCase().includes("bangs")) {
            haircutOverlay.style.boxShadow = "0 -40px 60px rgba(0,0,0,0.7) inset";
        } else if (styleName.toLowerCase().includes("pixie")) {
            haircutOverlay.style.boxShadow = "0 -25px 40px rgba(0,0,0,0.6) inset";
        } else if (styleName.toLowerCase().includes("bob")) {
            haircutOverlay.style.boxShadow = "0 -15px 35px rgba(0,0,0,0.6) inset";
        } else if (styleName.toLowerCase().includes("curly")) {
            haircutOverlay.style.boxShadow = "0 0 40px rgba(0,0,0,0.7) inset";
        } else {
            haircutOverlay.style.boxShadow = "0 -10px 25px rgba(0,0,0,0.5) inset";
        }
    }

    // BEAUTY BUTTONS
    document.querySelectorAll(".button-row button").forEach(btn => {
        btn.addEventListener("click", () => {
            const effect = btn.dataset.effect;
            const value = btn.dataset.value;

            // visual active state per row
            const row = btn.parentElement;
            row.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            if (effect === "makeup") applyMakeup(value);
            if (effect === "haircolor") applyHairColor(value);
            if (effect === "haircut") applyHaircut(value);
        });
    });

    startCamera();
</script>
</body>
</html>
