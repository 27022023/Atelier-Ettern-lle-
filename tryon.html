<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Beauty Try‑On</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      min-height:100vh;
      width:100vw;
      background:linear-gradient(135deg,#f8c8d8,#f7e7c9);
      font-family:"Playfair Display",serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:40px 16px 32px;
      color:#1b1410;
    }

    .back-arrow{
      position:fixed;
      top:20px;
      left:20px;
      font-size:2.2rem;
      cursor:pointer;
      color:#000;
      text-shadow:0 0 10px rgba(255,255,255,0.7);
      z-index:10;
    }

    h1{
      font-size:2rem;
      margin-bottom:6px;
      text-shadow:0 0 10px rgba(255,255,255,0.6);
      text-align:center;
    }

    .subtitle{
      font-size:.9rem;
      opacity:.8;
      margin-bottom:20px;
      text-align:center;
    }

    .wrapper{
      width:100%;
      max-width:900px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    /* mirror */
    .mirror-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:10px;
    }

    .mirror{
      position:relative;
      width:380px;
      height:380px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 20%,#fff7e0,#f5d487,#f4c76c,#f7e7c9);
      padding:14px;
      box-shadow:0 0 25px rgba(0,0,0,0.25),0 0 35px rgba(247,231,201,0.9);
    }

    .mirror-inner{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      background:#000;
    }

    video,canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* tabs */
    .tabs{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:8px;
      margin-bottom:6px;
      flex-wrap:wrap;
    }

    .tab{
      padding:8px 14px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-size:.9rem;
      background:rgba(255,255,255,0.8);
      box-shadow:0 0 10px rgba(255,255,255,0.9);
      transition:.2s;
    }

    .tab.active{
      background:linear-gradient(135deg,#f5d487,#f4c76c);
      color:#000;
    }

    .panel{
      width:100%;
      max-width:600px;
      background:rgba(255,255,255,0.9);
      border-radius:18px;
      padding:14px 16px;
      box-shadow:0 0 18px rgba(255,255,255,0.9);
      border:1px solid rgba(255,255,255,0.9);
    }

    .swatches{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .swatch{
      width:34px;
      height:34px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.9);
      cursor:pointer;
    }

    .styles-grid{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .style-pill{
      padding:8px 12px;
      border-radius:999px;
      background:#000;
      color:#f7e7c9;
      cursor:pointer;
      border:1px solid #f7e7c9;
    }

    .style-pill.active{
      background:#f5d487;
      color:#000;
    }

    @media(max-width:480px){
      .mirror{width:320px;height:320px;}
    }
  </style>
</head>
<body>

  <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

  <h1>Live Beauty Try‑On</h1>
  <div class="subtitle">Try hair colors, haircuts, and makeup live in your golden mirror.</div>

  <div class="wrapper">

    <div class="mirror-wrap">
      <div class="mirror">
        <div class="mirror-inner">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="haircolor">Hair Color</button>
      <button class="tab" data-tab="haircut">Haircut</button>
      <button class="tab" data-tab="makeup">Makeup</button>
    </div>

    <!-- Hair color panel -->
    <div class="panel" id="panel-haircolor">
      <div class="swatches">
        <div class="swatch" data-color="rgba(230,200,140,0.7)" style="background:#e6c88c;"></div>
        <div class="swatch" data-color="rgba(90,60,40,0.75)" style="background:#5a3c28;"></div>
        <div class="swatch" data-color="rgba(40,20,10,0.8)" style="background:#28140a;"></div>
        <div class="swatch" data-color="rgba(180,70,60,0.75)" style="background:#b4463c;"></div>
        <div class="swatch" data-color="rgba(220,120,160,0.7)" style="background:#dc78a0;"></div>
        <div class="swatch" data-color="rgba(170,130,220,0.7)" style="background:#aa82dc;"></div>
      </div>
    </div>

    <!-- Haircut panel -->
    <div class="panel" id="panel-haircut" style="display:none;">
      <div class="styles-grid">
        <div class="style-pill" data-haircut="curtain">Curtain Bangs</div>
        <div class="style-pill" data-haircut="bob">Bob</div>
        <div class="style-pill" data-haircut="wolf">Wolf Cut</div>
        <div class="style-pill" data-haircut="pixie">Pixie</div>
        <div class="style-pill" data-haircut="curls">Curls</div>
        <div class="style-pill" data-haircut="none">Clear</div>
      </div>
    </div>

    <!-- Makeup panel -->
    <div class="panel" id="panel-makeup" style="display:none;">
      <div class="styles-grid">
        <div class="style-pill" data-makeup="clean">Clean Glow</div>
        <div class="style-pill" data-makeup="softglam">Soft Glam</div>
        <div class="style-pill" data-makeup="fairy">Fairy</div>
        <div class="style-pill" data-makeup="bold">Bold</div>
        <div class="style-pill" data-makeup="none">Clear</div>
      </div>
    </div>

  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    let activeHairTint = null;
    let activeHaircut = null;
    let activeMakeup = null;
    let activeTab = "haircolor";

    async function startCamera(){
      const stream = await navigator.mediaDevices.getUserMedia({video:true});
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        resizeCanvas();
        requestAnimationFrame(drawLoop);
      };
    }

    function resizeCanvas(){
      const rect = video.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }

    function drawLoop(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      const w = canvas.width;
      const h = canvas.height;

      // HAIR TINT (top 40%)
      if(activeHairTint && activeTab==="haircolor"){
        ctx.fillStyle = activeHairTint;
        ctx.beginPath();
        ctx.ellipse(w/2, h*0.18, w*0.55, h*0.35, 0, 0, Math.PI*2);
        ctx.fill();
      }

      // HAIRCUT SHAPES
      if(activeHaircut && activeTab==="haircut" && activeHaircut!=="none"){
        ctx.fillStyle = "rgba(0,0,0,0.65)";

        if(activeHaircut==="curtain"){
          ctx.beginPath();
          ctx.ellipse(w/2, h*0.22, w*0.6, h*0.38, 0, 0, Math.PI*2);
          ctx.fill();
        }

        if(activeHaircut==="bob"){
          ctx.beginPath();
          ctx.roundRect(w*0.12, h*0.05, w*0.76, h*0.55, 60);
          ctx.fill();
        }

        if(activeHaircut==="wolf"){
          ctx.beginPath();
          ctx.moveTo(w*0.1, h*0.05);
          ctx.lineTo(w*0.9, h*0.05);
          ctx.lineTo(w*0.8, h*0.65);
          ctx.lineTo(w*0.2, h*0.65);
          ctx.closePath();
          ctx.fill();
        }

        if(activeHaircut==="pixie"){
          ctx.beginPath();
          ctx.ellipse(w/2, h*0.18, w*0.5, h*0.28, 0, 0, Math.PI*2);
          ctx.fill();
        }

        if(activeHaircut==="curls"){
          for(let i=0;i<7;i++){
            ctx.beginPath();
            ctx.arc(w*(0.15+i*0.12), h*0.22, h*0.14, 0, Math.PI*2);
            ctx.fill();
          }
        }
      }

      // MAKEUP (very visible)
      if(activeMakeup && activeTab==="makeup" && activeMakeup!=="none"){

        if(activeMakeup==="clean"){
          ctx.fillStyle="rgba(255,200,180,0.45)";
          ctx.beginPath();
          ctx.ellipse(w/2, h*0.62, w*0.45, h*0.28, 0, 0, Math.PI*2);
          ctx.fill();
        }

        if(activeMakeup==="softglam"){
          ctx.fillStyle="rgba(255,150,150,0.55)";
          ctx.beginPath();
          ctx.ellipse(w/2, h*0.68, w*0.42, h*0.22, 0, 0, Math.PI*2);
          ctx.fill();

          ctx.fillStyle="rgba(180,90,140,0.55)";
          ctx.fillRect(w*0.22, h*0.38, w*0.56, h*0.12);
        }

        if(activeMakeup==="fairy"){
          ctx.fillStyle="rgba(200,160,255,0.55)";
          ctx.beginPath();
          ctx.ellipse(w*0.35, h*0.4, w*0.22, h*0.12, 0, 0, Math.PI*2);
          ctx.ellipse(w*0.65, h*0.4, w*0.22, h*0.12, 0, 0, Math.PI*2);
          ctx.fill();

          ctx.fillStyle="rgba(255,190,220,0.55)";
          ctx.beginPath();
          ctx.ellipse(w/2, h*0.72, w*0.36, h*0.2, 0, 0, Math.PI*2);
          ctx.fill();
        }

        if(activeMakeup==="bold"){
          ctx.fillStyle="rgba(160,40,60,0.75)";
          ctx.beginPath();
          ctx.ellipse(w/2, h*0.74, w*0.34, h*0.16, 0, 0, Math.PI*2);
          ctx.fill();

          ctx.fillStyle="rgba(40,20,60,0.7)";
          ctx.fillRect(w*0.22, h*0.38, w*0.56, h*0.12);
        }
      }

      requestAnimationFrame(drawLoop);
    }

    // TAB SWITCHING
    document.querySelectorAll(".tab").forEach(tab=>{
      tab.addEventListener("click",()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");

        activeTab = tab.dataset.tab;

        document.getElementById("panel-haircolor").style.display = activeTab==="haircolor" ? "block" : "none";
        document.getElementById("panel-haircut").style.display = activeTab==="haircut" ? "block" : "none";
        document.getElementById("panel-makeup").style.display = activeTab==="makeup" ? "block" : "none";
      });
    });

    // HAIR COLOR
    document.querySelectorAll(".swatch").forEach(s=>{
      s.addEventListener("click",()=> activeHairTint = s.dataset.color);
    });

    // HAIRCUT
    document.querySelectorAll("[data-haircut]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        document.querySelectorAll("[data-haircut]").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        activeHaircut = btn.dataset.haircut;
      });
    });

    // MAKEUP
    document.querySelectorAll("[data-makeup]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        document.querySelectorAll("[data-makeup]").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        activeMakeup = btn.dataset.makeup;
      });
    });

    startCamera();
  </script>
</body>
</html>
