<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beauty Mirror</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#f7e7c9;
      font-family:Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
    }

    .mirror{
      width:360px;
      height:360px;
      border-radius:50%;
      padding:12px;
      background:radial-gradient(circle,#fff7e0,#f4c76c);
      box-shadow:0 0 25px rgba(0,0,0,0.25), inset 0 0 12px rgba(255,255,255,0.9);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .mirror-inner{
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      position:relative;
      background:#000;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      filter:var(--video-filter, none);
    }

    .controls{
      margin-top:20px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    button{
      padding:8px 14px;
      border:none;
      border-radius:20px;
      background:#000;
      color:#fff;
      cursor:pointer;
      font-size:14px;
    }
    .beauty-section {
    width: 100%;
    text-align: center;
    margin-top: 30px;
}

.beauty-section h3 {
    font-size: 20px;
    margin: 25px 0 15px;
    color: #d4af37; /* warm gold */
    font-weight: 600;
}

.button-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 22px; /* wide spacing */
    margin-bottom: 35px;
}

.button-row button {
    padding: 14px 26px;
    border-radius: 16px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    color: black; /* readable */
    background: linear-gradient(to bottom, #f8e7b8, #d9b56f);
    box-shadow: 0 4px 8px rgba(0,0,0,0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.button-row button:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.35);
}

.button-row button:active {
    transform: translateY(0);
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
}
    
  </style>
</head>
<body>

  <div class="mirror">
    <div class="mirror-inner">
      <video id="video" autoplay playsinline muted></video>
    </div>
  </div>

  <div class="controls">
    <button onclick="setFilter('none')">No Filter</button>
    <button onclick="setFilter('softglam')">Soft Glam</button>
    <button onclick="setFilter('warm')">Warm Glow</button>
    <button onclick="setFilter('cool')">Cool Tone</button>
    <button onclick="setFilter('smooth')">Smooth Skin</button>
    <button onclick="setFilter('dramatic')">Dramatic</button>
  </div>
<div class="beauty-section">

    <h3>Haircuts</h3>
    <div class="button-row">
        <button data-effect="haircut" data-value="butterfly">Butterfly Cut</button>
        <button data-effect="haircut" data-value="wolf">Wolf Cut</button>
        <button data-effect="haircut" data-value="pixie">Pixie Cut</button>
        <button data-effect="haircut" data-value="frenchbob">French Bob</button>
        <button data-effect="haircut" data-value="layers">Layers</button>
        <button data-effect="haircut" data-value="curtainbangs">Curtain Bangs</button>
        <button data-effect="haircut" data-value="fullbangs">Full Bangs</button>
        <button data-effect="haircut" data-value="lessbangs">Less Bangs</button>
        <button data-effect="haircut" data-value="straight">Straight</button>
        <button data-effect="haircut" data-value="curly">Curly</button>
    </div>

    <h3>Hair Color</h3>
    <div class="button-row">
        <button data-effect="haircolor" data-value="brown">Brown</button>
        <button data-effect="haircolor" data-value="black">Black</button>
        <button data-effect="haircolor" data-value="blonde">Blonde</button>
        <button data-effect="haircolor" data-value="ginger">Ginger</button>
        <button data-effect="haircolor" data-value="red">More Ginger‑Red</button>
    </div>

    <h3>Makeup</h3>
    <div class="button-row">
        <button data-effect="makeup" data-value="clean">Clean Girl</button>
        <button data-effect="makeup" data-value="natural">Natural Makeup</button>
        <button data-effect="makeup" data-value="stargirl">Stargirl Makeup</button>
        <button data-effect="makeup" data-value="fashion">Fashion Icon Model</button>
        <button data-effect="makeup" data-value="bold">Bold Makeup</button>
        <button data-effect="makeup" data-value="oldmoney">Old Money Makeup</button>
        <button data-effect="makeup" data-value="french">French Makeup</button>
        <button data-effect="makeup" data-value="coquette">Coquette Makeup</button>
    </div>

</div>
  
  <script>
    const video = document.getElementById("video");

    async function startCamera(){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video:{facingMode:"user"},
          audio:false
        });
        video.srcObject = stream;
      }catch(e){
        alert("Camera access failed: " + e.message);
      }
    }

    function setFilter(name){
      let filter = "none";

      if(name === "softglam"){
        filter = "brightness(1.15) contrast(1.1) saturate(1.25) blur(0.5px)";
      }else if(name === "warm"){
        filter = "brightness(1.1) contrast(1.05) sepia(0.25)";
      }else if(name === "cool"){
        filter = "brightness(1.05) contrast(1.1) hue-rotate(20deg)";
      }else if(name === "smooth"){
        filter = "brightness(1.1) blur(1px)";
      }else if(name === "dramatic"){
        filter = "contrast(1.4) saturate(1.2)";
      }

      video.style.setProperty("--video-filter", filter);
    }

    startCamera();
<script>

// HAIRCUT OVERLAY
const haircutOverlay = document.createElement("img");
haircutOverlay.id = "haircutOverlay";
haircutOverlay.style.position = "absolute";
haircutOverlay.style.top = "0";
haircutOverlay.style.left = "0";
haircutOverlay.style.width = "100%";
haircutOverlay.style.pointerEvents = "none";
haircutOverlay.style.zIndex = "999";
document.body.appendChild(haircutOverlay);

// HAIR COLOR LAYER
const hairColorLayer = document.createElement("div");
hairColorLayer.id = "hairColorLayer";
hairColorLayer.style.position = "absolute";
hairColorLayer.style.top = "0";
hairColorLayer.style.left = "0";
hairColorLayer.style.width = "100%";
hairColorLayer.style.height = "100%";
hairColorLayer.style.mixBlendMode = "soft-light";
hairColorLayer.style.pointerEvents = "none";
hairColorLayer.style.zIndex = "998";
document.body.appendChild(hairColorLayer);

// MAKEUP FILTER
function applyMakeup(type) {
    const video = document.querySelector("video");
    if (!video) return;

    const presets = {
        clean: "brightness(1.1) saturate(1.1)",
        natural: "brightness(1.05) contrast(1.05)",
        stargirl: "brightness(1.2) saturate(1.3)",
        fashion: "contrast(1.3) saturate(1.2)",
        bold: "contrast(1.4) saturate(1.4)",
        oldmoney: "brightness(0.95) contrast(1.1)",
        french: "contrast(1.2) saturate(1.1)",
        coquette: "brightness(1.15) saturate(1.25)"
    };

    video.style.filter = presets[type] || "none";
}

// HAIR COLOR
function applyHairColor(color) {
    const colors = {
        brown: "rgba(120, 72, 30, 0.35)",
        black: "rgba(20, 20, 20, 0.45)",
        blonde: "rgba(255, 220, 120, 0.35)",
        ginger: "rgba(200, 80, 20, 0.35)",
        red: "rgba(220, 40, 20, 0.35)"
    };

    hairColorLayer.style.background = colors[color] || "transparent";
}

// HAIRCUT
function applyHaircut(style) {
    haircutOverlay.src = `haircuts/${style}.png`;
}

// BUTTON CLICK HANDLER
document.querySelectorAll(".button-row button").forEach(btn => {
    btn.addEventListener("click", () => {
        const effect = btn.dataset.effect;
        const value = btn.dataset.value;

        if (effect === "haircut") applyHaircut(value);
        if (effect === "haircolor") applyHairColor(value);
        if (effect === "makeup") applyMakeup(value);
    });
});

</script>
</body>
</html>
