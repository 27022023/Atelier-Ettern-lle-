<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beauty Mirror</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon_1772911913761.png">
 <link rel="apple-touch-icon" href="icon_1772911913761.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon_1772911913761.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon_1772911913761.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon_1772911913761.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon_1772911913761.png">
  <style>
    body{
      margin:0;
      background:#f7e7c9;
      font-family:Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
    }

    /* Back Arrow */
    .back-arrow{
      position:fixed;
      top:18px;
      left:18px;
      font-size:2.2rem;
      cursor:pointer;
      color:#000;
      text-shadow:0 0 10px rgba(255,255,255,0.6);
      z-index:20;
      user-select:none;
    }

    .mirror{
      width:360px;
      height:360px;
      border-radius:50%;
      padding:12px;
      background:radial-gradient(circle,#fff7e0,#f4c76c);
      box-shadow:0 0 25px rgba(0,0,0,0.25), inset 0 0 12px rgba(255,255,255,0.9);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:40px;
    }

    .mirror-inner{
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      position:relative;
      background:#000;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scaleX(-1);
      filter:var(--video-filter, none);
    }

    .controls{
      margin-top:20px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      max-width:420px;
    }

    button{
      padding:8px 14px;
      border:none;
      border-radius:20px;
      background:#000;
      color:#fff;
      cursor:pointer;
      font-size:14px;
    }
  </style>
</head>
<body>

  <!-- BACK ARROW -->
  <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

  <div class="mirror">
    <div class="mirror-inner">
      <video id="video" autoplay playsinline muted></video>
    </div>
  </div>

  <div class="controls">
    <button onclick="setFilter('none')">No Filter</button>
    <button onclick="setFilter('softglam')">Soft Glam</button>
    <button onclick="setFilter('warm')">Warm Glow</button>
    <button onclick="setFilter('cool')">Cool Tone</button>
    <button onclick="setFilter('smooth')">Smooth Skin</button>
    <button onclick="setFilter('dramatic')">Dramatic</button>

    <!-- New Filters -->
    <button onclick="setFilter('peach')">Peach Glow</button>
    <button onclick="setFilter('noir')">Noir Film</button>
    <button onclick="setFilter('dream')">Dream Blur</button>
    <button onclick="setFilter('pop')">Vibrant Pop</button>
    <button onclick="setFilter('ice')">Ice Blue</button>
    <button onclick="setFilter('sunset')">Sunset</button>
    <button onclick="setFilter('porcelain')">Porcelain Skin</button>
    <button onclick="setFilter('cinematic')">Cinematic</button>
    <button onclick="setFilter('fairy')">Fairy Glow</button>
    <button onclick="setFilter('bronze')">Golden Bronze</button>
  </div>

  <script>
    const video = document.getElementById("video");

    async function startCamera(){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video:{facingMode:"user"},
          audio:false
        });
        video.srcObject = stream;
      }catch(e){
        alert("Camera access failed: " + e.message);
      }
    }

    function setFilter(name){
      let filter = "none";

      if(name === "softglam"){
        filter = "brightness(1.15) contrast(1.1) saturate(1.25) blur(0.5px)";
      }else if(name === "warm"){
        filter = "brightness(1.1) contrast(1.05) sepia(0.25)";
      }else if(name === "cool"){
        filter = "brightness(1.05) contrast(1.1) hue-rotate(20deg)";
      }else if(name === "smooth"){
        filter = "brightness(1.1) blur(1px)";
      }else if(name === "dramatic"){
        filter = "contrast(1.4) saturate(1.2)";
      }

      // NEW FILTERS
      else if(name === "peach"){
        filter = "brightness(1.12) contrast(1.05) saturate(1.2) sepia(0.15)";
      }else if(name === "noir"){
        filter = "grayscale(1) contrast(1.4) brightness(1.1)";
      }else if(name === "dream"){
        filter = "blur(2px) brightness(1.1) saturate(1.1)";
      }else if(name === "pop"){
        filter = "contrast(1.25) saturate(1.5) brightness(1.05)";
      }else if(name === "ice"){
        filter = "hue-rotate(180deg) saturate(1.2) brightness(1.1)";
      }else if(name === "sunset"){
        filter = "sepia(0.35) saturate(1.3) hue-rotate(-20deg) brightness(1.1)";
      }else if(name === "porcelain"){
        filter = "brightness(1.2) contrast(0.9) blur(1.2px)";
      }else if(name === "cinematic"){
        filter = "contrast(1.35) brightness(0.95) saturate(1.15)";
      }else if(name === "fairy"){
        filter = "brightness(1.15) saturate(1.25) hue-rotate(15deg) blur(0.7px)";
      }else if(name === "bronze"){
        filter = "sepia(0.4) contrast(1.1) brightness(1.05)";
      }

      video.style.setProperty("--video-filter", filter);
    }

    startCamera();
  </script>
</body>
</html>
