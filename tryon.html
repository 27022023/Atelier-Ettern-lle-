<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Beauty Try‑On</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      min-height:100vh;
      width:100vw;
      background:linear-gradient(135deg,#f8c8d8,#f7e7c9);
      font-family:"Playfair Display",serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:40px 16px 32px;
      color:#1b1410;
    }

    .back-arrow{
      position:fixed;
      top:20px;
      left:20px;
      font-size:2.2rem;
      cursor:pointer;
      color:#000;
      text-shadow:0 0 10px rgba(255,255,255,0.7);
      z-index:10;
    }

    h1{
      font-size:2rem;
      margin-bottom:6px;
      text-shadow:0 0 10px rgba(255,255,255,0.6);
      text-align:center;
    }

    .subtitle{
      font-size:.9rem;
      opacity:.8;
      margin-bottom:20px;
      text-align:center;
    }

    .wrapper{
      width:100%;
      max-width:900px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    .mirror-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:10px;
    }

    .mirror{
      position:relative;
      width:380px;
      height:380px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 20%,#fff7e0,#f5d487,#f4c76c,#f7e7c9);
      padding:14px;
      box-shadow:0 0 25px rgba(0,0,0,0.25),0 0 35px rgba(247,231,201,0.9);
    }

    .mirror-inner{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      background:#000;
    }

    video,canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .tabs{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:8px;
      margin-bottom:6px;
      flex-wrap:wrap;
    }

    .tab{
      padding:8px 14px;
      border-radius:999px;
      border:none;
      cursor:pointer;
      font-size:.9rem;
      background:rgba(255,255,255,0.8);
      box-shadow:0 0 10px rgba(255,255,255,0.9);
      transition:.2s;
    }

    .tab.active{
      background:linear-gradient(135deg,#f5d487,#f4c76c);
      color:#000;
    }

    .panel{
      width:100%;
      max-width:600px;
      background:rgba(255,255,255,0.9);
      border-radius:18px;
      padding:14px 16px;
      box-shadow:0 0 18px rgba(255,255,255,0.9);
      border:1px solid rgba(255,255,255,0.9);
    }

    .swatches{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .swatch{
      width:34px;
      height:34px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.9);
      cursor:pointer;
    }

    .styles-grid{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .style-pill{
      padding:8px 12px;
      border-radius:999px;
      background:#000;
      color:#f7e7c9;
      cursor:pointer;
      border:1px solid #f7e7c9;
    }

    .style-pill.active{
      background:#f5d487;
      color:#000;
    }

    @media(max-width:480px){
      .mirror{width:320px;height:320px;}
    }
  </style>
</head>
<body>

  <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

  <h1>Live Beauty Try‑On</h1>
  <div class="subtitle">Real‑time face tracking for hair, haircuts and makeup in your golden mirror.</div>

  <div class="wrapper">

    <div class="mirror-wrap">
      <div class="mirror">
        <div class="mirror-inner">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="haircolor">Hair Color</button>
      <button class="tab" data-tab="haircut">Haircut</button>
      <button class="tab" data-tab="makeup">Makeup</button>
    </div>

    <div class="panel" id="panel-haircolor">
      <div class="swatches">
        <div class="swatch" data-color="rgba(230,200,140,0.7)" style="background:#e6c88c;"></div>
        <div class="swatch" data-color="rgba(90,60,40,0.75)" style="background:#5a3c28;"></div>
        <div class="swatch" data-color="rgba(40,20,10,0.8)" style="background:#28140a;"></div>
        <div class="swatch" data-color="rgba(180,70,60,0.75)" style="background:#b4463c;"></div>
        <div class="swatch" data-color="rgba(220,120,160,0.7)" style="background:#dc78a0;"></div>
        <div class="swatch" data-color="rgba(170,130,220,0.7)" style="background:#aa82dc;"></div>
      </div>
    </div>

    <div class="panel" id="panel-haircut" style="display:none;">
      <div class="styles-grid">
        <div class="style-pill" data-haircut="curtain">Curtain Bangs</div>
        <div class="style-pill" data-haircut="bob">Bob</div>
        <div class="style-pill" data-haircut="wolf">Wolf Cut</div>
        <div class="style-pill" data-haircut="pixie">Pixie</div>
        <div class="style-pill" data-haircut="curls">Curls</div>
        <div class="style-pill" data-haircut="none">Clear</div>
      </div>
    </div>

    <div class="panel" id="panel-makeup" style="display:none;">
      <div class="styles-grid">
        <div class="style-pill" data-makeup="clean">Clean Glow</div>
        <div class="style-pill" data-makeup="softglam">Soft Glam</div>
        <div class="style-pill" data-makeup="fairy">Fairy</div>
        <div class="style-pill" data-makeup="bold">Bold</div>
        <div class="style-pill" data-makeup="none">Clear</div>
      </div>
    </div>

  </div>

  <!-- MediaPipe FaceMesh + camera utils -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    let activeHairTint = null;
    let activeHaircut = null;
    let activeMakeup = null;
    let activeTab = "haircolor";

    function resizeCanvas(width, height){
      canvas.width = width;
      canvas.height = height;
    }

    function drawPolygon(points, fillStyle){
      if(points.length === 0) return;
      ctx.fillStyle = fillStyle;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for(let i=1;i<points.length;i++){
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.closePath();
      ctx.fill();
    }

    function onResults(results){
      const img = results.image;
      resizeCanvas(img.width, img.height);
      ctx.save();
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      if(!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0){
        ctx.restore();
        return;
      }

      const landmarks = results.multiFaceLandmarks[0];
      const w = canvas.width;
      const h = canvas.height;

      const p = i => ({x: landmarks[i].x * w, y: landmarks[i].y * h});

      // HAIR COLOR: tint above forehead using forehead + top points
      if(activeHairTint && activeTab === "haircolor"){
        const forehead = p(10);   // near forehead
        const topHead = p(151);   // top of head-ish
        const radiusX = (Math.abs(p(234).x - p(454).x) * 0.7) || (w*0.4);
        const radiusY = Math.abs(forehead.y - topHead.y) * 1.4 || (h*0.25);

        ctx.fillStyle = activeHairTint;
        ctx.beginPath();
        ctx.ellipse(w/2, topHead.y, radiusX, radiusY, 0, 0, Math.PI*2);
        ctx.fill();
      }

      // HAIRCUT: shapes aligned to head
      if(activeHaircut && activeTab === "haircut" && activeHaircut !== "none"){
        const topHead = p(151);
        const chin = p(152);
        const leftHead = p(234);
        const rightHead = p(454);

        const headWidth = Math.abs(rightHead.x - leftHead.x);
        const headHeight = Math.abs(chin.y - topHead.y);

        ctx.fillStyle = "rgba(0,0,0,0.65)";

        if(activeHaircut === "curtain"){
          ctx.beginPath();
          ctx.ellipse((leftHead.x+rightHead.x)/2, topHead.y + headHeight*0.15, headWidth*0.7, headHeight*0.45, 0, 0, Math.PI*2);
          ctx.fill();
        }

        if(activeHaircut === "bob"){
          ctx.beginPath();
          const x = leftHead.x - headWidth*0.15;
          const y = topHead.y - headHeight*0.05;
          const wRect = headWidth*1.3;
          const hRect = headHeight*0.8;
          ctx.roundRect(x, y, wRect, hRect, 40);
          ctx.fill();
        }

        if(activeHaircut === "wolf"){
          ctx.beginPath();
          ctx.moveTo(leftHead.x - headWidth*0.2, topHead.y - headHeight*0.1);
          ctx.lineTo(rightHead.x + headWidth*0.2, topHead.y - headHeight*0.1);
          ctx.lineTo(rightHead.x + headWidth*0.1, chin.y + headHeight*0.1);
          ctx.lineTo(leftHead.x - headWidth*0.1, chin.y + headHeight*0.1);
          ctx.closePath();
          ctx.fill();
        }

        if(activeHaircut === "pixie"){
          ctx.beginPath();
          ctx.ellipse((leftHead.x+rightHead.x)/2, topHead.y + headHeight*0.05, headWidth*0.6, headHeight*0.35, 0, 0, Math.PI*2);
          ctx.fill();
        }

        if(activeHaircut === "curls"){
          const centerY = topHead.y + headHeight*0.2;
          const radius = headHeight*0.18;
          for(let i=0;i<7;i++){
            const t = -0.6 + i*(1.2/6);
            const x = (leftHead.x+rightHead.x)/2 + t*headWidth*0.7;
            ctx.beginPath();
            ctx.arc(x, centerY, radius, 0, Math.PI*2);
            ctx.fill();
          }
        }
      }

      // MAKEUP: lips, eyes, cheeks using landmarks
      if(activeMakeup && activeTab === "makeup" && activeMakeup !== "none"){
        // Lips polygon (outer)
        const lipIndices = [61,146,91,181,84,17,314,405,321,375,291,308];
        const lipPoints = lipIndices.map(p);
        // Eyes (simple rectangles around eyes)
        const leftEyeCenter = p(159);
        const rightEyeCenter = p(386);
        const eyeWidth = headWidth(landmarks,w) * 0.25;
        const eyeHeight = eyeWidth * 0.4;

        // Cheeks
        const leftCheek = p(234);
        const rightCheek = p(454);

        if(activeMakeup === "clean"){
          ctx.globalAlpha = 0.45;
          ctx.fillStyle = "rgba(255,200,180,1)";
          drawPolygon(lipPoints, ctx.fillStyle);
          ctx.beginPath();
          ctx.ellipse(leftCheek.x, leftCheek.y+headHeight(landmarks,h)*0.05, headWidth(landmarks,w)*0.18, headHeight(landmarks,h)*0.12, 0, 0, Math.PI*2);
          ctx.ellipse(rightCheek.x, rightCheek.y+headHeight(landmarks,h)*0.05, headWidth(landmarks,w)*0.18, headHeight(landmarks,h)*0.12, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        if(activeMakeup === "softglam"){
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = "rgba(180,60,90,1)";
          drawPolygon(lipPoints, ctx.fillStyle);

          ctx.fillStyle = "rgba(200,120,150,1)";
          ctx.fillRect(leftEyeCenter.x-eyeWidth/2, leftEyeCenter.y-eyeHeight/2, eyeWidth, eyeHeight);
          ctx.fillRect(rightEyeCenter.x-eyeWidth/2, rightEyeCenter.y-eyeHeight/2, eyeWidth, eyeHeight);

          ctx.fillStyle = "rgba(255,170,170,1)";
          ctx.beginPath();
          ctx.ellipse(leftCheek.x, leftCheek.y+headHeight(landmarks,h)*0.05, headWidth(landmarks,w)*0.2, headHeight(landmarks,h)*0.13, 0, 0, Math.PI*2);
          ctx.ellipse(rightCheek.x, rightCheek.y+headHeight(landmarks,h)*0.05, headWidth(landmarks,w)*0.2, headHeight(landmarks,h)*0.13, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        if(activeMakeup === "fairy"){
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = "rgba(210,140,255,1)";
          ctx.fillRect(leftEyeCenter.x-eyeWidth/2, leftEyeCenter.y-eyeHeight/2, eyeWidth, eyeHeight);
          ctx.fillRect(rightEyeCenter.x-eyeWidth/2, rightEyeCenter.y-eyeHeight/2, eyeWidth, eyeHeight);

          ctx.fillStyle = "rgba(255,190,220,1)";
          drawPolygon(lipPoints, ctx.fillStyle);

          ctx.fillStyle = "rgba(255,210,240,1)";
          ctx.beginPath();
          ctx.ellipse(leftCheek.x, leftCheek.y+headHeight(landmarks,h)*0.05, headWidth(landmarks,w)*0.22, headHeight(landmarks,h)*0.14, 0, 0, Math.PI*2);
          ctx.ellipse(rightCheek.x, rightCheek.y+headHeight(landmarks,h)*0.05, headWidth(landmarks,w)*0.22, headHeight(landmarks,h)*0.14, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        if(activeMakeup === "bold"){
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = "rgba(160,40,60,1)";
          drawPolygon(lipPoints, ctx.fillStyle);

          ctx.fillStyle = "rgba(40,20,60,1)";
          ctx.fillRect(leftEyeCenter.x-eyeWidth/2, leftEyeCenter.y-eyeHeight/2, eyeWidth, eyeHeight);
          ctx.fillRect(rightEyeCenter.x-eyeWidth/2, rightEyeCenter.y-eyeHeight/2, eyeWidth, eyeHeight);
          ctx.globalAlpha = 1;
        }
      }

      ctx.restore();
    }

    function headWidth(landmarks,w){
      const left = landmarks[234].x * w;
      const right = landmarks[454].x * w;
      return Math.abs(right-left);
    }

    function headHeight(landmarks,h){
      const top = landmarks[10].y * h;
      const bottom = landmarks[152].y * h;
      return Math.abs(bottom-top);
    }

    // Tabs
    document.querySelectorAll(".tab").forEach(tab=>{
      tab.addEventListener("click",()=>{
        document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        activeTab = tab.dataset.tab;
        document.getElementById("panel-haircolor").style.display = activeTab==="haircolor" ? "block" : "none";
        document.getElementById("panel-haircut").style.display = activeTab==="haircut" ? "block" : "none";
        document.getElementById("panel-makeup").style.display = activeTab==="makeup" ? "block" : "none";
      });
    });

    // Hair color
    document.querySelectorAll(".swatch").forEach(s=>{
      s.addEventListener("click",()=> activeHairTint = s.dataset.color);
    });

    // Haircut
    document.querySelectorAll("[data-haircut]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        document.querySelectorAll("[data-haircut]").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        activeHaircut = btn.dataset.haircut;
      });
    });

    // Makeup
    document.querySelectorAll("[data-makeup]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        document.querySelectorAll("[data-makeup]").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        activeMakeup = btn.dataset.makup || btn.dataset.makeup;
      });
    });

    // Fix typo-safe
    document.querySelectorAll("[data-makeup]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        activeMakeup = btn.getAttribute("data-makeup");
      });
    });

    // Start MediaPipe FaceMesh + camera
    const faceMesh = new FaceMesh.FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);

    const camera = new Camera.Camera(video, {
      onFrame: async () => {
        await faceMesh.send({image: video});
      },
      width: 640,
      height: 480
    });

    camera.start();
  </script>
</body>
</html>
