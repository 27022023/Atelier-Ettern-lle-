<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Face Filter Mirror</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #f7e7c9;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .mirror {
    width: 360px;
    height: 360px;
    border-radius: 50%;
    padding: 12px;
    background: radial-gradient(circle, #fff7e0, #f4c76c);
    box-shadow: 0 0 25px rgba(0,0,0,0.25), inset 0 0 12px rgba(255,255,255,0.9);
  }

  .mirror-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    background: #000;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  video {
    display: none;
  }

  .filters {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 8px 14px;
    border: none;
    border-radius: 20px;
    background: #000;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="mirror">
  <div class="mirror-inner">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div class="filters">
  <button onclick="setFilter('clean')">Clean</button>
  <button onclick="setFilter('softglam')">Soft Glam</button>
  <button onclick="setFilter('fairy')">Fairy</button>
  <button onclick="setFilter('bold')">Bold</button>
  <button onclick="setFilter(null)">Clear</button>
</div>

<video id="video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let faceLandmarker = null;
let lastLandmarks = null;
let activeFilter = null;

function setFilter(f) {
  activeFilter = f;
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

window.addEventListener("resize", resizeCanvas);

async function initAI() {
  const { FaceLandmarker, FilesetResolver } = vision;
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
  );

  faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
    },
    runningMode: "VIDEO",
    numFaces: 1
  });
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    resizeCanvas();
    video.play();
    requestAnimationFrame(loop);
  };
}

function drawPolygon(points, color, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function applyFilter() {
  if (!activeFilter || !lastLandmarks) return;

  const lm = lastLandmarks;
  const p = i => ({
    x: lm[i].x * canvas.width,
    y: lm[i].y * canvas.height
  });

  ctx.globalCompositeOperation = "soft-light";

  const lips = [61,146,91,181,84,17,314,405,321,375,291,308].map(p);
  const leftLid = [159,145,153,154,155].map(p);
  const rightLid = [386,374,380,381,382].map(p);
  const leftCheek = [234,93,132,58].map(p);
  const rightCheek = [454,323,361,288].map(p);

  if (activeFilter === "clean") {
    drawPolygon(lips, "rgba(255,180,180,1)", 0.45);
    drawPolygon(leftCheek, "rgba(255,170,170,0.35)", 1);
    drawPolygon(rightCheek, "rgba(255,170,170,0.35)", 1);
  }

  if (activeFilter === "softglam") {
    drawPolygon(lips, "rgba(200,80,120,1)", 0.55);
    drawPolygon(leftLid, "rgba(200,120,150,0.45)", 1);
    drawPolygon(rightLid, "rgba(200,120,150,0.45)", 1);
    drawPolygon(leftCheek, "rgba(255,170,170,0.35)", 1);
    drawPolygon(rightCheek, "rgba(255,170,170,0.35)", 1);
  }

  if (activeFilter === "fairy") {
    drawPolygon(lips, "rgba(255,190,230,1)", 0.6);
    drawPolygon(leftLid, "rgba(210,160,255,0.45)", 1);
    drawPolygon(rightLid, "rgba(210,160,255,0.45)", 1);
    drawPolygon(leftCheek, "rgba(255,170,170,0.35)", 1);
    drawPolygon(rightCheek, "rgba(255,170,170,0.35)", 1);
  }

  if (activeFilter === "bold") {
    drawPolygon(lips, "rgba(160,40,60,1)", 0.75);
    drawPolygon(leftLid, "rgba(40,20,60,0.55)", 1);
    drawPolygon(rightLid, "rgba(40,20,60,0.55)", 1);
  }

  ctx.globalCompositeOperation = "source-over";
}

async function loop() {
  if (faceLandmarker) {
    const now = performance.now();
    const results = faceLandmarker.detectForVideo(video, now);
    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      lastLandmarks = results.faceLandmarks[0];
    }
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  applyFilter();

  requestAnimationFrame(loop);
}

(async () => {
  await initAI();
  await startCamera();
})();
</script>

</body>
</html>
