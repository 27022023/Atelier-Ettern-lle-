<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Helper Mega</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    width: 100vw;
    background: linear-gradient(135deg, #5a4634, #7a5e47, #c8b39a);
    font-family: "Playfair Display", serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 0 40px;
    color: #2a1f18;
}

/* Back Arrow */
.back-arrow {
    position: fixed;
    top: 18px;
    left: 18px;
    font-size: 2.1rem;
    cursor: pointer;
    color: #d8b46a;
    text-shadow: 0 0 10px rgba(216,180,106,0.6);
    z-index: 10;
}

.back-arrow:hover {
    text-shadow: 0 0 14px rgba(216,180,106,0.9);
}

h1 {
    font-size: 2rem;
    margin-bottom: 18px;
    color: #f7f2e9;
    text-shadow: 0 0 10px rgba(216,180,106,0.6);
}

.section-label {
    width: 92%;
    max-width: 900px;
    font-size: 1rem;
    font-weight: 600;
    margin: 4px 0 8px;
    color: #f7f2e9;
}

/* Grids */
.grid {
    width: 92%;
    max-width: 900px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
}

.card {
    background: rgba(247,242,233,0.65);
    backdrop-filter: blur(6px);
    border: 2px solid #d8b46a;
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s ease;
    color: #2a1f18;
    font-size: 0.95rem;
    font-weight: 600;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 14px rgba(216,180,106,0.7);
}

/* Layout for Tabs + Content */
.main-container {
    width: 94%;
    max-width: 1200px;
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

/* Vertical Tabs */
.tabs {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.tab {
    background: rgba(247,242,233,0.55);
    border: 2px solid #d8b46a;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
    text-align: center;
}

.tab:hover {
    box-shadow: 0 0 12px rgba(216,180,106,0.7);
}

.tab.active {
    background: rgba(247,242,233,0.8);
    border-color: #f7f2e9;
    box-shadow: 0 0 14px rgba(216,180,106,0.9);
}

/* Content Area */
.content-area {
    flex: 1;
    background: rgba(247,242,233,0.7);
    backdrop-filter: blur(8px);
    border: 2px solid #d8b46a;
    border-radius: 18px;
    padding: 20px;
}

.content-area h2 {
    font-size: 1.4rem;
    margin-bottom: 10px;
    color: #2a1f18;
}

.bullet {
    margin-left: 14px;
    margin-bottom: 6px;
    font-size: 1rem;
}
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Style Helper Mega</h1>

<div class="section-label">1. Pick the place</div>
<div class="grid" id="eventGrid"></div>

<div class="section-label">2. Pick the season</div>
<div class="grid" id="seasonGrid"></div>

<div class="main-container">
    <div class="tabs" id="tabs"></div>
    <div class="content-area" id="contentArea">
        <h2>Select a category</h2>
        <p class="bullet">Pick an event, a season, and a category tab.</p>
    </div>
</div>

<script>
/* ------------------ EVENTS ------------------ */
const events = [
    "School","Work","Coffee Date","Shopping","Study Session","Gym","Errands",
    "Brunch","Picnic","Concert","Festival","Movie Night","Sleepover","Club Night",
    "Prom","Gala","Wedding Guest","Graduation","Travel Day","Airport","Beach Day",
    "Pool Day","Rainy Day","Snow Day","Photoshoot","First Date","Anniversary",
    "Family Dinner","Christmas Market","Summer BBQ","Hiking","Museum Day",
    "Library Study Day","Casual Party","Fancy Dinner","School Presentation",
    "Job Interview"
];

/* ------------------ CATEGORIES ------------------ */
const categories = [
    "Hair","Outfits","Shoes","Bags","Accessories","Jewelry","Makeup","Nails",
    "Perfume","Colors","Fabrics","Layering","Weather Tips","Aesthetic Vibe","Avoid"
];

/* ------------------ BASE STYLE DATA ------------------ */
const eventStyles = {
    "School": {
        "Hair": [

        "Outfits": [
            "Comfortable jeans with a soft knit sweater for an easy everyday outfit",

            "Hoodie layered over leggings for a cozy, practical day"
        ],
        "Shoes": [
            "Neutral sneakers that stay comfortable walking between classes",
            "Flat ankle boots that add a bit of structure without feeling too formal"
        ],
        "Bags": [
            "Mini backpack that fits your essentials without feeling bulky",
            "Simple tote bag that carries notebooks and a water bottle easily"
        ],
        "Accessories": [
            "Soft scrunchie on your wrist or in your hair for a gentle touch",
            "Small stud earrings that stay comfortable all day"
        ],
        "Jewelry": [
            "Small gold or silver hoops that add subtle shine",
            "Delicate necklace that doesn’t distract from your outfit"
        ],
        "Makeup": [
            "Light base with concealer where needed for a fresh look",
            "Soft mascara and a bit of blush to brighten your face",
            "Hydrating lip balm or a soft pink gloss for everyday wear"
        ],
        "Nails": [
            "Clear gloss for a clean, low-maintenance look",
            "Soft pink or nude polish that goes with any outfit"
        ],
        "Perfume": [
            "Light floral mist that feels fresh but not overpowering",
            "Soft vanilla or clean cotton scent for a gentle everyday vibe"
        ],
        "Colors": [
            "Warm beige and cream tones for a soft school aesthetic",
            "Brown and taupe shades that feel calm and easy to style"
        ],
        "Fabrics": [
            "Cotton pieces that stay breathable and comfortable all day",
            "Soft knits that feel cozy without being too heavy"
        ],
        "Layering": [
            "Light cardigan layered over a tee for changing classroom temperatures",
            "Zip-up hoodie you can easily take on and off between classes"
        ],
        "Weather Tips": [
            "Bring a light layer in case classrooms feel colder than outside",
            "Choose breathable fabrics so you stay comfortable all day"
        ],
        "Aesthetic Vibe": [
            "Soft, casual, and quietly feminine with a practical school focus",
            "Comfort-first with gentle details that still feel put-together"
        ],
        "Avoid": [
            "Very high heels that are hard to walk in between classes",
            "Heavy makeup that feels uncomfortable for a long school day"
        ]
    },

    "default": {
        "Hair": [
            "Soft waves with a gentle finish that stay manageable throughout the day",
            "Low ponytail with a loose front piece for a soft frame around the face"
        ],
        "Outfits": [
            "Simple jeans paired with a fitted top for a balanced silhouette",
            "Flowy skirt with a tucked-in tee for a soft, feminine look"
        ],
        "Shoes": [
            "Neutral sneakers that keep the outfit clean and comfortable",
            "Soft ballet flats for a gentle, feminine touch"
        ],
        "Bags": [
            "Small crossbody bag that keeps essentials close and hands free",
            "Structured mini bag that adds a polished detail"
        ],
        "Accessories": [
            "Delicate hair clip or barrette for a subtle accent",
            "Light scarf or shawl to soften the overall look"
        ],
        "Jewelry": [
            "Thin gold or silver hoops that add quiet shine",
            "Simple rings that feel elegant but not overwhelming"
        ],
        "Makeup": [
            "Soft base with a natural finish and a hint of blush",
            "Mascara and a neutral lip color for a polished everyday look"
        ],
        "Nails": [
            "Clear gloss for a clean everyday look",
            "Soft nude or pale pink for a gentle, feminine finish"
        ],
        "Perfume": [
            "Light floral mist for a soft daytime feel",
            "Warm vanilla or gentle musk for a cozy touch"
        ],
        "Colors": [
            "Soft beige, cream, and warm neutrals that pair easily",
            "Muted pinks and browns for a gentle, feminine palette"
        ],
        "Fabrics": [
            "Cotton and linen for breathable comfort",
            "Soft knits for a cozy, approachable vibe"
        ],
        "Layering": [
            "Light cardigan or denim jacket for easy layering",
            "Soft scarf for a gentle, feminine touch"
        ],
        "Weather Tips": [
            "Bring a light layer for shifting indoor/outdoor temperatures",
            "Choose breathable fabrics for all‑day comfort"
        ],
        "Aesthetic Vibe": [
            "Soft, feminine, and approachable with gentle details",
            "Balanced between comfort and quiet elegance"
        ],
        "Avoid": [
            "Overly bold patterns that clash with a soft aesthetic",
            "Heavy or stiff fabrics that feel restrictive"
        ]
    }
};
 /* ------------------ SEASONS ------------------ */
const seasons = ["Spring", "Summer", "Autumn", "Winter"];

/* ------------------ UI POPULATION ------------------ */
const eventGrid = document.getElementById("eventGrid");
const seasonGrid = document.getElementById("seasonGrid");
const tabs = document.getElementById("tabs");
const contentArea = document.getElementById("contentArea");

let selectedEvent = null;
let selectedSeason = null;
let selectedCategory = null;

/* Populate Events */
events.forEach(ev => {
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = ev;
    card.onclick = () => {
        selectedEvent = ev;
        updateTabs();
        updateContent();
    };
    eventGrid.appendChild(card);
});

/* Populate Seasons */
seasons.forEach(season => {
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = season;
    card.onclick = () => {
        selectedSeason = season;
        updateTabs();
        updateContent();
    };
    seasonGrid.appendChild(card);
});

/* Populate Tabs */
function updateTabs() {
    tabs.innerHTML = "";
    categories.forEach(cat => {
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.textContent = cat;

        if (selectedCategory === cat) {
            tab.classList.add("active");
        }

        tab.onclick = () => {
            selectedCategory = cat;
            updateTabs();
            updateContent();
        };

        tabs.appendChild(tab);
    });
}

/* Update Content */
function updateContent() {
    if (!selectedEvent || !selectedSeason || !selectedCategory) {
        contentArea.innerHTML = `
            <h2>Select a category</h2>
            <p class="bullet">Pick an event, a season, and a category tab.</p>
        `;
        return;
    }

    const eventData = eventStyles[selectedEvent] || eventStyles["default"];
    const categoryData = eventData[selectedCategory] || ["No data available."];

    contentArea.innerHTML = `
        <h2>${selectedCategory}</h2>
        ${categoryData.map(item => `<p class="bullet">• ${item}</p>`).join("")}
    `;
}
/* ------------------ END OF SCRIPT ------------------ */
</script>

</body>
</html>
