<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Helper</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f3d9ff, #f7e7ff);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: #d8b4fe;
            text-shadow: 0 0 10px rgba(216,180,254,0.7);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #d8b4fe;
            text-shadow: 0 0 12px rgba(216,180,254,0.6);
        }

        .dropdown {
            width: 85%;
            max-width: 600px;
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 14px;
            padding: 12px;
            color: #d8b4fe;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        select {
            width: 100%;
            background: transparent;
            border: none;
            color: #d8b4fe;
            font-size: 1.2rem;
            outline: none;
        }

        .button-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .style-btn {
            background: #d8b4fe;
            color: black;
            padding: 14px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .style-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(216,180,254,0.6);
        }

        .results {
            margin-top: 30px;
            width: 85%;
            max-width: 600px;
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 18px;
            padding: 20px;
            color: #d8b4fe;
            text-align: left;
            display: none;
        }

        .results h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #e9d5ff;
        }

        .bullet {
            margin-left: 15px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Style Helper</h1>

    <div class="dropdown">
        <select id="locationSelect">
            <option value="" disabled selected>Where are you going?</option>
            <option>School</option>
            <option>Date</option>
            <option>Party</option>
            <option>Brunch</option>
            <option>Gym</option>
            <option>Shopping</option>
            <option>Beach</option>
            <option>Formal Event</option>
        </select>
    </div>

    <div class="button-container">
        <button class="style-btn" onclick="showResults('hair')">Hairstyle Ideas</button>
        <button class="style-btn" onclick="showResults('outfit')">Outfit Ideas</button>
        <button class="style-btn" onclick="showResults('makeup')">Makeup Ideas</button>
        <button class="style-btn" onclick="showResults('accessories')">Accessories Ideas</button>
    </div>

    <div id="resultsBox" class="results">
        <h2>Your Style Suggestions</h2>
        <div id="resultsContent"></div>
    </div>

<script>
    const ideas = {
        School: {
            hair: [
                "• Low messy bun with face-framing pieces",
                "• Half-up half-down with a pastel scrunchie",
                "• Sleek ponytail with a middle part"
            ],
            outfit: [
                "• Oversized hoodie + pleated skirt",
                "• White tee + jeans + pastel cardigan",
                "• Cute sweater + black leggings"
            ],
            makeup: [
                "• Light blush + mascara",
                "• Soft pink gloss",
                "• Natural brows + dewy skin"
            ],
            accessories: [
                "• Small hoops",
                "• Pastel hair clips",
                "• Minimal necklace"
            ]
        },

        Date: {
            hair: [
                "• Soft curls",
                "• Half-up bow hairstyle",
                "• Sleek straight hair"
            ],
            outfit: [
                "• Mini dress + cardigan",
                "• Cute top + skirt",
                "• Off-shoulder top + jeans"
            ],
            makeup: [
                "• Soft glam: pink blush + glossy lips",
                "• Winged eyeliner + nude lips",
                "• Shimmery eyeshadow + mascara"
            ],
            accessories: [
                "• Pearl earrings",
                "• Dainty necklace",
                "• Cute shoulder bag"
            ]
        },

        Party: {
            hair: [
                "• High ponytail",
                "• Loose waves",
                "• Slick bun"
            ],
            outfit: [
                "• Black mini dress",
                "• Sparkly top + skirt",
                "• Leather jacket + crop top"
            ],
            makeup: [
                "• Smokey eye",
                "• Glitter lids",
                "• Bold lip"
            ],
            accessories: [
                "• Statement earrings",
                "• Mini bag",
                "• Layered necklaces"
            ]
        }
    };

    function showResults(type) {
        const location = document.getElementById("locationSelect").value;
        const resultsBox = document.getElementById("resultsBox");
        const resultsContent = document.getElementById("resultsContent");

        if (!location) {
            resultsContent.innerHTML = "<p>Please choose where you're going first!</p>";
            resultsBox.style.display = "block";
            return;
        }

        const category = {
            hair: "Hairstyle Ideas",
            outfit: "Outfit Ideas",
            makeup: "Makeup Ideas",
            accessories: "Accessories Ideas"
        }[type];

        const list = ideas[location]?.[type] || ["• No suggestions available yet"];

        resultsContent.innerHTML = `
            <div class="section-title">${category} for ${location}</div>
            ${list.map(item => `<div class="bullet">${item}</div>`).join("")}
        `;

        resultsBox.style.display = "block";
    }
</script>

</body>
</html>
