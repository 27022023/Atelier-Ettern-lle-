<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Helper Mega</title>
<link rel="icon" type="image/png" href="icon_1772911913761.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    width: 100vw;
    background: linear-gradient(135deg, #5a4634, #7a5e47, #c8b39a);
    font-family: "Playfair Display", serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 0 40px;
    color: #2a1f18;
}

/* Back Arrow */
.back-arrow {
    position: fixed;
    top: 18px;
    left: 18px;
    font-size: 2.1rem;
    cursor: pointer;
    color: #d8b46a;
    text-shadow: 0 0 10px rgba(216,180,106,0.6);
    z-index: 10;
}

.back-arrow:hover {
    text-shadow: 0 0 14px rgba(216,180,106,0.9);
}

h1 {
    font-size: 2rem;
    margin-bottom: 18px;
    color: #f7f2e9;
    text-shadow: 0 0 10px rgba(216,180,106,0.6);
}

.section-label {
    width: 92%;
    max-width: 900px;
    font-size: 1rem;
    font-weight: 600;
    margin: 4px 0 8px;
    color: #f7f2e9;
}

/* Grids */
.grid {
    width: 92%;
    max-width: 900px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
}

.card {
    background: rgba(247,242,233,0.65);
    backdrop-filter: blur(6px);
    border: 2px solid #d8b46a;
    border-radius: 16px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s ease;
    color: #2a1f18;
    font-size: 0.95rem;
    font-weight: 600;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 14px rgba(216,180,106,0.7);
}

/* Layout for Tabs + Content */
.main-container {
    width: 94%;
    max-width: 1200px;
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

/* Vertical Tabs */
.tabs {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.tab {
    background: rgba(247,242,233,0.55);
    border: 2px solid #d8b46a;
    padding: 12px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
    text-align: center;
}

.tab:hover {
    box-shadow: 0 0 12px rgba(216,180,106,0.7);
}

.tab.active {
    background: rgba(247,242,233,0.8);
    border-color: #f7f2e9;
    box-shadow: 0 0 14px rgba(216,180,106,0.9);
}

/* Content Area */
.content-area {
    flex: 1;
    background: rgba(247,242,233,0.7);
    backdrop-filter: blur(8px);
    border: 2px solid #d8b46a;
    border-radius: 18px;
    padding: 20px;
}

.content-area h2 {
    font-size: 1.4rem;
    margin-bottom: 10px;
    color: #2a1f18;
}

.bullet {
    margin-left: 14px;
    margin-bottom: 6px;
    font-size: 1rem;
}
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Style Helper Mega</h1>

<div class="section-label">1. Pick the place</div>
<div class="grid" id="eventGrid"></div>

<div class="section-label">2. Pick the season</div>
<div class="grid" id="seasonGrid"></div>

<div class="main-container">
    <div class="tabs" id="tabs"></div>
    <div class="content-area" id="contentArea">
        <h2>Select a category</h2>
        <p class="bullet">Pick an event, a season, and a category tab.</p>
    </div>
</div>

<script>
/* ------------------ EVENTS ------------------ */
const events = [
    "School","Work","Coffee Date","Shopping","Study Session","Gym","Errands",
    "Brunch","Picnic","Concert","Festival","Movie Night","Sleepover","Club Night",
    "Prom","Gala","Wedding Guest","Graduation","Travel Day","Airport","Beach Day",
    "Pool Day","Rainy Day","Snow Day","Photoshoot","First Date","Anniversary",
    "Family Dinner","Christmas Market","Summer BBQ","Hiking","Museum Day",
    "Library Study Day","Casual Party","Fancy Dinner","School Presentation",
    "Job Interview"
];

/* ------------------ CATEGORIES ------------------ */
const categories = [
    "Hair","Outfits","Shoes","Bags","Accessories","Jewelry","Makeup","Nails",
    "Perfume","Colors","Fabrics","Layering","Weather Tips","Aesthetic Vibe","Avoid"
];

/* ------------------ BASIC STYLE DATA (expand later) ------------------ */
const eventStyles = {
    "School": {
        Hair: ["Soft ponytail","Half-up clip","Loose waves"],
        Outfits: ["Jeans + sweater","Graphic tee + pants","Hoodie + leggings"],
        Shoes: ["Sneakers","Flat boots"],
        Bags: ["Mini backpack","Tote bag"],
        Accessories: ["Studs","Scrunchie"],
        Jewelry: ["Small hoops","Simple necklace"],
        Makeup: ["Natural base","Mascara","Lip balm"],
        Nails: ["Clear gloss","Soft pink"],
        Perfume: ["Light floral"],
        Colors: ["Beige","Brown","Cream"],
        Fabrics: ["Cotton","Knit"],
        Layering: ["Light cardigan"],
        Weather: ["Check temperature"],
        Vibe: ["Soft academia"],
        Avoid: ["Heavy glam","Heels"]
    },
    "default": {
        Hair: ["Soft waves"],
        Outfits: ["Jeans + cute top"],
        Shoes: ["Sneakers"],
        Bags: ["Crossbody"],
        Accessories: ["Hoops"],
        Jewelry: ["Rings"],
        Makeup: ["Natural"],
        Nails: ["Gloss"],
        Perfume: ["Fresh"],
        Colors: ["Neutral"],
        Fabrics: ["Cotton"],
        Layering: ["Light jacket"],
        Weather: ["Check temperature"],
        Vibe: ["Casual cute"],
        Avoid: ["Too formal"]
    }
};

/* ------------------ SEASONS ------------------ */
const seasons = ["Spring","Summer","Fall","Winter"];

const seasonStyles = {
    "Summer": {
        Hair: ["High pony","Beach waves","Claw clip"],
        Outfits: ["Baby tee + shorts","Sundress","Tank top"],
        Shoes: ["Sandals","Sneakers"],
        Bags: ["Mini bag","Canvas tote"],
        Accessories: ["Sunglasses","Anklets"],
        Jewelry: ["Gold hoops"],
        Makeup: ["Bronzed skin","Gloss"],
        Nails: ["Peach","White"],
        Perfume: ["Citrus"],
        Colors: ["White","Beige","Pastels"],
        Fabrics: ["Linen","Cotton"],
        Layering: ["Light shirt"],
        Weather: ["Stay cool"],
        Vibe: ["Light & cute"],
        Avoid: ["Sweaters","Heavy jackets"]
    },
    "default": {
        Hair: ["Soft waves"],
        Outfits: ["Seasonal outfit"],
        Shoes: ["Seasonal shoes"],
        Bags: ["Crossbody"],
        Accessories: ["Simple jewelry"],
        Jewelry: ["Rings"],
        Makeup: ["Natural"],
        Nails: ["Neutral"],
        Perfume: ["Fresh"],
        Colors: ["Neutral"],
        Fabrics: ["Cotton"],
        Layering: ["Light jacket"],
        Weather: ["Check temperature"],
        Vibe: ["Cute"],
        Avoid: ["Weather-inappropriate items"]
    }
};

/* ------------------ STATE ------------------ */
let selectedEvent = null;
let selectedSeason = null;
let selectedCategory = null;

/* ------------------ HELPERS ------------------ */
function getEventData(ev) {
    return eventStyles[ev] || eventStyles["default"];
}

function getSeasonData(season) {
    return seasonStyles[season] || seasonStyles["default"];
}

function blend(eventList, seasonList) {
    return [...new Set([...eventList, ...seasonList])];
}

/* ------------------ BUILD EVENT GRID ------------------ */
function loadEventGrid() {
    const grid = document.getElementById("eventGrid");
    grid.innerHTML = "";

    events.forEach(ev => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.textContent = ev;

        card.onclick = () => {
            selectedEvent = ev;
            document.querySelectorAll("#eventGrid .card").forEach(c => {
                c.style.borderColor = "#d8b46a";
                c.style.boxShadow = "none";
            });
            card.style.borderColor = "#f7f2e9";
            card.style.boxShadow = "0 0 14px rgba(216,180,106,0.9)";
            updateContent();
        };

        grid.appendChild(card);
    });
}

function loadSeasonGrid() {
    const grid = document.getElementById("seasonGrid");
    grid.innerHTML = "";

    seasons.forEach(season => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.textContent = season;

        card.onclick = () => {
            selectedSeason = season;
            document.querySelectorAll("#seasonGrid .card").forEach(c => {
                c.style.borderColor = "#d8b46a";
                c.style.boxShadow = "none";
            });
            card.style.borderColor = "#f7f2e9";
            card.style.boxShadow = "0 0 14px rgba(216,180,106,0.9)";
            updateContent();
        };

        grid.appendChild(card);
    });
}

loadEventGrid();
loadSeasonGrid();

/* ------------------ BUILD TABS ------------------ */
function loadTabs() {
    const tabContainer = document.getElementById("tabs");
    tabContainer.innerHTML = "";

    categories.forEach(cat => {
        const tab = document.createElement("div");
        tab.classList.add("tab");
        tab.textContent = cat;

        tab.onclick = () => {
            selectedCategory = cat;
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            updateContent();
        };

        tabContainer.appendChild(tab);
    });
}

loadTabs();

/* ------------------ UPDATE CONTENT ------------------ */
function updateContent() {
    const content = document.getElementById("contentArea");

    if (!selectedEvent || !selectedSeason || !selectedCategory) {
        content.innerHTML = `<h2>Select a category</h2><p class="bullet">Pick an event, a season, and a category tab.</p>`;
        return;
    }

    const evData = getEventData(selectedEvent)[selectedCategory] || [];
    const seasonData = getSeasonData(selectedSeason)[selectedCategory] || [];

    const finalList = blend(evData, seasonData);

    content.innerHTML = `
        <h2>${selectedCategory}</h2>
        ${finalList.map(i => `<div class="bullet">• ${i}</div>`).join("")}
    `;
}
</script>

</body>
</html>
