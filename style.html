<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style Helper</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        min-height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #f7dce9, #f3c7da, #f2bcd3);
        font-family: "Playfair Display", serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 0 40px;
        color: #2a2a2a;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 18px;
        color: #2a2a2a;
        text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    .section-label {
        width: 92%;
        max-width: 900px;
        font-size: 1rem;
        font-weight: 600;
        margin: 4px 0 8px;
        color: #3a3a3a;
    }

    /* Grids */
    .grid {
        width: 92%;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
    }

    .card {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(8px);
        border: 2px solid #e8a9c4;
        border-radius: 16px;
        padding: 14px;
        text-align: center;
        cursor: pointer;
        transition: 0.2s ease;
        color: #2a2a2a;
        font-size: 0.95rem;
        font-weight: 600;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 14px rgba(255,255,255,0.7);
    }

    /* Results */
    .results {
        width: 94%;
        max-width: 1100px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 10px;
    }

    .result-card {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        border: 2px solid #e8a9c4;
        border-radius: 18px;
        padding: 16px;
        color: #2a2a2a;
        font-size: 1rem;
    }

    .result-card h2 {
        font-size: 1.25rem;
        margin-bottom: 8px;
        color: #2a2a2a;
        text-shadow: 0 0 6px rgba(255,255,255,0.7);
    }

    .bullet {
        margin-left: 14px;
        margin-bottom: 6px;
        font-size: 0.95rem;
    }

    .hint {
        width: 92%;
        max-width: 900px;
        font-size: 0.9rem;
        color: #555;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<h1>Style Helper</h1>

<div class="section-label">1. Pick the place</div>
<div class="grid" id="eventGrid"></div>

<div class="section-label">2. Pick the season</div>
<div class="grid" id="seasonGrid"></div>

<p class="hint">Once you pick a place and a season, your blended style ideas will appear below.</p>

<div class="results">
    <div class="result-card" id="hairCard"></div>
    <div class="result-card" id="outfitCard"></div>
    <div class="result-card" id="accessoryCard"></div>
    <div class="result-card" id="makeupCard"></div>
</div>

/* ------------------ DATA: SEASONS ------------------ */
const seasons = ["Spring", "Summer", "Fall", "Winter"];

const seasonStyles = {
    "Spring": {

        ],

            "Red lip",
            "Silver shimmer eyeshadow"
        ]
    }
};

/* ------------------ STATE ------------------ */
let selectedEvent = null;
let selectedSeason = null;

/* ------------------ HELPERS ------------------ */
function getEventData(ev) {
    return eventStyles[ev] || eventStyles["default"];
}

function getSeasonData(season) {
    return seasonStyles[season];
}

function blendLists(eventList, seasonList, max = 6) {
    const combined = [...eventList, ...seasonList];
    // Remove duplicates
    const unique = [...new Set(combined)];
    return unique.slice(0, max);
}

/* ------------------ BUILD GRIDS ------------------ */
function loadEventGrid() {
    const grid = document.getElementById("eventGrid");
    grid.innerHTML = "";

    events.forEach(ev => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.textContent = ev;

        card.onclick = () => {
            selectedEvent = ev;
            document.querySelectorAll("#eventGrid .card").forEach(c => {
                c.style.borderColor = "#e8a9c4";
                c.style.boxShadow = "none";
            });
            card.style.borderColor = "#ffffff";
            card.style.boxShadow = "0 0 14px rgba(255,255,255,0.9)";
            updateStyleIdeas();
        };

        grid.appendChild(card);
    });
}

function loadSeasonGrid() {
    const grid = document.getElementById("seasonGrid");
    grid.innerHTML = "";

    seasons.forEach(season => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.textContent = season;

        card.onclick = () => {
            selectedSeason = season;
            document.querySelectorAll("#seasonGrid .card").forEach(c => {
                c.style.borderColor = "#e8a9c4";
                c.style.boxShadow = "none";
            });
            card.style.borderColor = "#ffffff";
            card.style.boxShadow = "0 0 14px rgba(255,255,255,0.9)";
            updateStyleIdeas();
        };

        grid.appendChild(card);
    });
}

loadEventGrid();
loadSeasonGrid();

/* ------------------ UPDATE RESULTS ------------------ */
function updateStyleIdeas() {
    const hairCard = document.getElementById("hairCard");
    const outfitCard = document.getElementById("outfitCard");
    const accessoryCard = document.getElementById("accessoryCard");
    const makeupCard = document.getElementById("makeupCard");

    if (!selectedEvent || !selectedSeason) {
        hairCard.innerHTML = `<h2>Hairstyles</h2><div class="bullet">• Pick a place and a season to see ideas.</div>`;
        outfitCard.innerHTML = `<h2>Outfits</h2><div class="bullet">• Pick a place and a season to see ideas.</div>`;
        accessoryCard.innerHTML = `<h2>Accessories</h2><div class="bullet">• Pick a place and a season to see ideas.</div>`;
        makeupCard.innerHTML = `<h2>Makeup</h2><div class="bullet">• Pick a place and a season to see ideas.</div>`;
        return;
    }

    const evData = getEventData(selectedEvent);
    const seasonData = getSeasonData(selectedSeason);

    const blendedHair = blendLists(evData.hair, seasonData.hair);
    const blendedOutfit = blendLists(evData.outfit, seasonData.outfit);
    const blendedAccessories = blendLists(evData.accessories, seasonData.accessories);
    const blendedMakeup = blendLists(evData.makeup, seasonData.makeup);

    hairCard.innerHTML = `
        <h2>Hairstyles</h2>
        ${blendedHair.map(h => `<div class="bullet">• ${h}</div>`).join("")}
    `;

    outfitCard.innerHTML = `
        <h2>Outfits</h2>
        ${blendedOutfit.map(o => `<div class="bullet">• ${o}</div>`).join("")}
    `;

    accessoryCard.innerHTML = `
        <h2>Accessories</h2>
        ${blendedAccessories.map(a => `<div class="bullet">• ${a}</div>`).join("")}
    `;

    makeupCard.innerHTML = `
        <h2>Makeup</h2>
        ${blendedMakeup.map(m => `<div class="bullet">• ${m}</div>`).join("")}
    `;
}
