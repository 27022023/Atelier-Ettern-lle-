<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Guide</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f3d9ff, #f7e7ff);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .back-arrow {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: #d8b4fe;
            text-shadow: 0 0 10px rgba(216,180,254,0.7);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #d8b4fe;
            text-shadow: 0 0 12px rgba(216,180,254,0.6);
        }

        .form-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-field {
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 14px;
            padding: 12px;
            color: #d8b4fe;
            font-size: 1.2rem;
        }

        .input-field select {
            width: 100%;
            background: transparent;
            border: none;
            color: #d8b4fe;
            font-size: 1.2rem;
            outline: none;
        }

        .upload-box {
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            color: #d8b4fe;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .upload-box:hover {
            box-shadow: 0 0 20px rgba(216,180,254,0.5);
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        .analyze-btn {
            margin-top: 10px;
            background: #d8b4fe;
            color: black;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .analyze-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(216,180,254,0.6);
        }

        .results {
            margin-top: 30px;
            width: 85%;
            max-width: 600px;
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 18px;
            padding: 20px;
            color: #d8b4fe;
            text-align: left;
            display: none;
        }

        .results h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #e9d5ff;
        }

        .bullet {
            margin-left: 15px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Beauty Guide</h1>

    <div class="form-container">

        <div class="input-field">
            <select id="skinType">
                <option value="" disabled selected>Skin Type</option>
                <option>Dry</option>
                <option>Oily</option>
                <option>Combination</option>
                <option>Normal</option>
                <option>Sensitive</option>
            </select>
        </div>

        <div class="input-field">
            <select id="skinTone">
                <option value="" disabled selected>Skin Tone</option>
                <option>Fair</option>
                <option>Light</option>
                <option>Medium</option>
                <option>Tan</option>
                <option>Deep</option>
            </select>
        </div>

        <div class="input-field">
            <select id="hairColor">
                <option value="" disabled selected>Hair Color</option>
                <option>Blonde</option>
                <option>Brown</option>
                <option>Black</option>
                <option>Red</option>
                <option>Dyed / Fashion Color</option>
            </select>
        </div>

        <div class="input-field">
            <select id="eyeColor">
                <option value="" disabled selected>Eye Color</option>
                <option>Blue</option>
                <option>Green</option>
                <option>Brown</option>
                <option>Hazel</option>
                <option>Grey</option>
            </select>
        </div>

        <label class="upload-box">
            Upload your photo (optional)
            <input type="file" id="photoInput" accept="image/*">
        </label>

        <button class="analyze-btn" onclick="showResults()">Show my beauty profile</button>
    </div>

    <div id="resultsBox" class="results">
        <h2>Your Beauty Profile</h2>
        <div id="makeup"></div>
        <div id="colors"></div>
        <div id="hair"></div>
        <div id="jewelry"></div>
        <div id="tips"></div>
    </div>

<script>
    function showResults() {
        const skinTone = document.getElementById("skinTone").value;
        const hairColor = document.getElementById("hairColor").value;
        const eyeColor = document.getElementById("eyeColor").value;

        const resultsBox = document.getElementById("resultsBox");
        resultsBox.style.display = "block";

        // Makeup suggestions
        const makeup = {
            Fair: ["Soft pink blush", "Light brown eyeshadow", "Rose gloss"],
            Light: ["Peach blush", "Champagne shimmer", "Nude gloss"],
            Medium: ["Warm bronzer", "Gold shimmer", "Mauve lipstick"],
            Tan: ["Terracotta blush", "Bronze eyeshadow", "Brown gloss"],
            Deep: ["Berry blush", "Purple shimmer", "Deep plum lipstick"]
        };

        // Clothing colors
        const colors = {
            Blonde: ["Lavender", "Soft blue", "White", "Pastel pink"],
            Brown: ["Lilac", "Emerald", "Cream", "Warm neutrals"],
            Black: ["Lavender", "Silver", "Hot pink", "White"],
            Red: ["Soft purple", "Black", "Cream", "Gold"],
            "Dyed / Fashion Color": ["Monochrome fits", "Pastels", "Black basics"]
        };

        // Hair suggestions
        const hair = {
            Blue: ["Soft curls", "Curtain bangs", "Half-up styles"],
            Green: ["Sleek ponytail", "Loose waves", "Braided crown"],
            Brown: ["Face-framing layers", "Glossy straight hair", "Low bun"],
            Hazel: ["Beach waves", "Soft curls", "Half-up bow"],
            Grey: ["Voluminous curls", "Sleek bob", "Layered cut"]
        };

        // Jewelry tones
        const jewelry = {
            Fair: ["Silver", "Rose gold"],
            Light: ["Rose gold", "White gold"],
            Medium: ["Gold", "Rose gold"],
            Tan: ["Gold", "Bronze"],
            Deep: ["Gold", "Deep bronze"]
        };

        // Beauty tips
        const tips = [
            "Hydrate your skin daily.",
            "Use sunscreen every morning.",
            "Match your blush to your lip color.",
            "Brush your brows upward for a lifted look.",
            "Use highlighter on cheekbones + nose bridge."
        ];

        document.getElementById("makeup").innerHTML = `
            <div class="section-title">💄 Makeup Colors</div>
            ${makeup[skinTone]?.map(m => `<div class="bullet">• ${m}</div>`).join("") || "<div class='bullet'>• Select your skin tone</div>"}
        `;

        document.getElementById("colors").innerHTML = `
            <div class="section-title">🎨 Clothing Colors</div>
            ${colors[hairColor]?.map(c => `<div class="bullet">• ${c}</div>`).join("") || "<div class='bullet'>• Select your hair color</div>"}
        `;

        document.getElementById("hair").innerHTML = `
            <div class="section-title">💇 Hairstyle Suggestions</div>
            ${hair[eyeColor]?.map(h => `<div class="bullet">• ${h}</div>`).join("") || "<div class='bullet'>• Select your eye color</div>"}
        `;

        document.getElementById("jewelry").innerHTML = `
            <div class="section-title">💍 Best Jewelry Tones</div>
            ${jewelry[skinTone]?.map(j => `<div class="bullet">• ${j}</div>`).join("") || "<div class='bullet'>• Select your skin tone</div>"}
        `;

        document.getElementById("tips").innerHTML = `
            <div class="section-title">✨ Beauty Tips</div>
            ${tips.map(t => `<div class="bullet">• ${t}</div>`).join("")}
        `;
    }
</script>

</body>
</html>
