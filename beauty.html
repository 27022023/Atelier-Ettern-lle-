<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Guide</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f7e7c9, #f8dcb8);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 0 40px;
        }

        .back-arrow {
            position: fixed;
            top: 18px;
            left: 18px;
            font-size: 2.1rem;
            cursor: pointer;
            color: #f5d487;
            text-shadow: 0 0 10px rgba(247,231,201,0.6);
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 18px;
            color: #f5d487;
            text-shadow: 0 0 12px rgba(247,231,201,0.6);
        }

        .form-container {
            width: 90%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
        }

        .input-field {
            background: black;
            border: 2px solid #f7e7c9;
            border-radius: 18px;
            padding: 8px 12px;
            color: #f7e7c9;
            font-size: 1rem;
        }

        .input-field select {
            width: 100%;
            background: transparent;
            border: none;
            color: #f7e7c9;
            font-size: 1rem;
            outline: none;
        }

        .upload-box {
            background: black;
            border: 2px solid #f7e7c9;
            border-radius: 18px;
            padding: 10px 12px;
            text-align: center;
            color: #f7e7c9;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .upload-box:hover {
            box-shadow: 0 0 18px rgba(247,231,201,0.6);
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        .analyze-btn {
            margin-top: 6px;
            background: #f5d487;
            color: black;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
            box-shadow: 0 0 10px rgba(247,231,201,0.6);
            align-self: center;
        }

        .analyze-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(247,231,201,0.8);
        }

        .results {
            margin-top: 22px;
            width: 94%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }

        .result-card {
            background: black;
            border: 2px solid #f7e7c9;
            border-radius: 18px;
            padding: 12px 14px;
            color: #f7e7c9;
            font-size: 0.95rem;
        }

        .result-card h2 {
            font-size: 1.15rem;
            margin-bottom: 6px;
            color: #f5d487;
        }

        .section-title {
            font-size: 1rem;
            margin-top: 8px;
            margin-bottom: 3px;
            color: #f7e7c9;
        }

        .bullet {
            margin-left: 14px;
            margin-bottom: 3px;
            font-size: 0.9rem;
        }

        .tag-row {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            border-radius: 999px;
            border: 1px solid #f7e7c9;
            padding: 3px 9px;
            font-size: 0.8rem;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Beauty Guide</h1>

    <div class="form-container">

        <div class="input-field">
            <select id="skinType">
                <option value="" disabled selected>Skin Type</option>
                <option>Dry</option>
                <option>Oily</option>
                <option>Combination</option>
                <option>Normal</option>
                <option>Sensitive</option>
            </select>
        </div>

        <div class="input-field">
            <select id="skinTone">
                <option value="" disabled selected>Skin Tone</option>
                <option>Fair</option>
                <option>Light</option>
                <option>Medium</option>
                <option>Tan</option>
                <option>Deep</option>
            </select>
        </div>

        <div class="input-field">
            <select id="undertone">
                <option value="" disabled selected>Undertone</option>
                <option>Cool</option>
                <option>Neutral</option>
                <option>Warm</option>
            </select>
        </div>

        <div class="input-field">
            <select id="hairColor">
                <option value="" disabled selected>Hair Color</option>
                <option>Blonde</option>
                <option>Brown</option>
                <option>Black</option>
                <option>Red</option>

        <div class="input-field">
            <select id="eyeColor">

                <option>Blue</option>
                <option>Green</option>
                <option>Brown</option>
                <option>Hazel</option>
                <option>Grey</option>
            </select>
        </div>

        <div class="input-field">
            <select id="faceShape">
                <option value="" disabled selected>Face Shape</option>
                <option>Oval</option>
                <option>Round</option>
                <option>Square</option>
                <option>Heart</option>
                <option>Diamond</option>
                <option>Long</option>
            </select>
        </div>

        <div class="input-field">
            <select id="aesthetic">
                <option value="" disabled selected>Preferred Aesthetic</option>
                <option>Clean girl</option>
                <option>Soft girl</option>
                <option>Coquette</option>
                <option>Classy</option>
                <option>Glam</option>
                <option>Minimalist</option>
                <option>Y2K</option>
                <option>Baddie</option>
            </select>
        </div>

        <label class="upload-box">
            Upload your photo (optional)
            <input type="file" id="photoInput" accept="image/*">
        </label>

        <button class="analyze-btn" onclick="showResults()">Show my beauty profile</button>
    </div>

    <div id="resultsWrapper" class="results">
        <div class="result-card" id="makeupCard"></div>
        <div class="result-card" id="colorsCard"></div>
        <div class="result-card" id="hairCard"></div>
        <div class="result-card" id="jewelryCard"></div>
        <div class="result-card" id="skincareCard"></div>
        <div class="result-card" id="aestheticCard"></div>
        <div class="result-card" id="photoCard"></div>
    </div>
