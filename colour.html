<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Analysis</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f7e7c9, #f8dcb8);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 0 40px;
        }

        .back-arrow {
            position: fixed;
            top: 18px;
            left: 18px;
            font-size: 2.1rem;
            cursor: pointer;
            color: #f5d487;
            text-shadow: 0 0 10px rgba(247,231,201,0.6);
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 18px;
            color: #f5d487;
            text-shadow: 0 0 12px rgba(247,231,201,0.6);
        }

        .form-container {
            width: 90%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 22px;
        }

        .input-field {
            background: black;
            border: 2px solid #f7e7c9;
            border-radius: 18px;
            padding: 10px 14px;
            color: #f7e7c9;
            font-size: 1rem;
        }

        .input-field select {
            width: 100%;
            background: transparent;
            border: none;
            color: #f7e7c9;
            font-size: 1rem;
            outline: none;
        }

        .analyze-btn {
            margin-top: 10px;
            background: #f5d487;
            color: black;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
            box-shadow: 0 0 10px rgba(247,231,201,0.6);
            align-self: center;
        }

        .analyze-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(247,231,201,0.8);
        }

        .results {
            margin-top: 22px;
            width: 94%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .result-card {
            background: black;
            border: 2px solid #f7e7c9;
            border-radius: 18px;
            padding: 14px 16px;
            color: #f7e7c9;
            font-size: 1rem;
        }

        .result-card h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: #f5d487;
        }

        .section-title {
            font-size: 1.05rem;
            margin-top: 10px;
            margin-bottom: 4px;
            color: #f7e7c9;
        }

        .bullet {
            margin-left: 14px;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        /* Silvery-blue palette boxes */
        .palette-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .swatch {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            border: 2px solid #dbe7f5;
            background: #c9d9f2;
            box-shadow: 0 0 8px rgba(200,220,255,0.4);
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Color Analysis</h1>

    <div class="form-container">

        <div class="input-field">
            <select id="skinTone">
                <option disabled selected>Skin Tone Depth</option>
                <option>Fair</option>
                <option>Light</option>
                <option>Medium</option>
                <option>Tan</option>
                <option>Deep</option>
            </select>
        </div>

        <div class="input-field">
            <select id="undertone">
                <option disabled selected>Undertone</option>
                <option>Cool</option>
                <option>Neutral</option>
                <option>Warm</option>
            </select>
        </div>

        <div class="input-field">
            <select id="hairDepth">
                <option disabled selected>Hair Depth</option>
                <option>Light</option>
                <option>Medium</option>
                <option>Dark</option>
            </select>
        </div>

        <div class="input-field">
            <select id="eyeClarity">
                <option disabled selected>Eye Clarity</option>
                <option>Soft</option>
                <option>Muted</option>
                <option>Bright</option>
                <option>Deep</option>
            </select>
        </div>

        <button class="analyze-btn" onclick="showSeason()">Show my season</button>
    </div>

    <div id="resultsWrapper" class="results">
        <div class="result-card" id="seasonCard"></div>
        <div class="result-card" id="paletteCard"></div>
    </div>
