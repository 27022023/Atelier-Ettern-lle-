<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  width:100vw;
  background:linear-gradient(135deg,#0a0f2d,#0f1a3d,#13224f);
  font-family:"Playfair Display",serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:32px 0 40px;
  color:#f7e7c9;
}

/* back arrow */
.back-arrow{
  position:fixed;
  top:18px;
  left:18px;
  font-size:2.1rem;
  cursor:pointer;
  color:#f5d487;
  text-shadow:0 0 10px rgba(247,231,201,0.6);
  z-index:10;
}

/* title */
h1{
  font-size:2.2rem;
  margin-bottom:18px;
  color:#f5d487;
  text-shadow:0 0 12px rgba(247,231,201,0.6);
}

/* form */
.form-container{
  width:90%;
  max-width:700px;
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:22px;
}

.input-field{
  background:#0d122f;
  border:2px solid #f7e7c9;
  border-radius:18px;
  padding:10px 14px;
  color:#f7e7c9;
  font-size:1rem;
}

.input-field select{
  width:100%;
  background:transparent;
  border:none;
  color:#f7e7c9;
  font-size:1rem;
  outline:none;
}

/* button */
.analyze-btn{
  margin-top:10px;
  background:#f5d487;
  color:black;
  padding:12px 18px;
  border-radius:16px;
  font-size:1.1rem;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:0.2s ease;
  box-shadow:0 0 10px rgba(247,231,201,0.6);
  align-self:center;
}

.analyze-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(247,231,201,0.8);
}

/* results */
.results{
  margin-top:22px;
  width:94%;
  max-width:1100px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;
}

.result-card{
  background:#0d122f;
  border:2px solid #f7e7c9;
  border-radius:18px;
  padding:16px 18px;
  color:#f7e7c9;
  font-size:1rem;
}

.result-card h2{
  font-size:1.4rem;
  margin-bottom:8px;
  color:#f5d487;
}

.section-title{
  font-size:1.1rem;
  margin-top:12px;
  margin-bottom:4px;
  color:#f5d487;
}

.bullet{
  margin-left:14px;
  margin-bottom:4px;
  font-size:0.95rem;
}

/* palette */
.palette-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.swatch{
  width:48px;
  height:48px;
  border-radius:10px;
  border:2px solid #dbe7f5;
  background:#c9d9f2;
  box-shadow:0 0 8px rgba(200,220,255,0.4);
}
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Color Analysis</h1>

<div class="form-container">
  <div class="input-field">
    <select id="skinTone">
      <option disabled selected>Skin Tone Depth</option>
      <option>Fair</option>
      <option>Light</option>
      <option>Medium</option>
      <option>Tan</option>
      <option>Deep</option>
    </select>
  </div>

  <div class="input-field">
    <select id="undertone">
      <option disabled selected>Undertone</option>
      <option>Cool</option>
      <option>Neutral</option>
      <option>Warm</option>
    </select>
  </div>

  <div class="input-field">
    <select id="hairDepth">
      <option disabled selected>Hair Depth</option>
      <option>Light</option>
      <option>Medium</option>
      <option>Dark</option>
    </select>
  </div>

  <div class="input-field">
    <select id="eyeClarity">
      <option disabled selected>Eye Clarity</option>
      <option>Soft</option>
      <option>Muted</option>
      <option>Bright</option>
      <option>Deep</option>
    </select>
  </div>

  <button class="analyze-btn" onclick="showSeason()">Show my season</button>
</div>

<div id="resultsWrapper" class="results">
  <div class="result-card" id="seasonCard"></div>
  <div class="result-card" id="paletteCard"></div>
  <div class="result-card" id="detailsCard"></div>
  <div class="result-card" id="outfitCard"></div>
  <div class="result-card" id="makeupCard"></div>
  <div class="result-card" id="hairCard"></div>
  <div class="result-card" id="matchingCard"></div>
</div>

  const skinTone=document.getElementById("skinTone").value;

  const hairDepth=document.getElementById("hairDepth").value;
  const eyeClarity=document.getElementById("eyeClarity").value;

  const seasonCard=document.getElementById("seasonCard");
  const paletteCard=document.getElementById("paletteCard");
  const detailsCard=document.getElementById("detailsCard");
  const outfitCard=document.getElementById("outfitCard");
  const makeupCard=document.getElementById("makeupCard");
  const hairCard=document.getElementById("hairCard");
  const matchingCard=document.getElementById("matchingCard");

  if(!skinTone||!undertone||!hairDepth||!eyeClarity){
    seasonCard.innerHTML=`<h2>Your Season</h2><div class="bullet">• Please fill out all fields.</div>`;
    paletteCard.innerHTML=`<h2>Palette</h2><div class="bullet">• No palette available.</div>`;
    detailsCard.innerHTML="";
    outfitCard.innerHTML="";
    makeupCard.innerHTML="";
    hairCard.innerHTML="";
    matchingCard.innerHTML="";
    return;
  }

  /* Determine season */
  let temperature=undertone==="Cool"?"cool":undertone==="Warm"?"warm":"neutral";
  let value=(skinTone==="Fair"||skinTone==="Light")?"light":(skinTone==="Medium")?"medium":"deep";
  let chroma=(eyeClarity==="Bright")?"bright":(eyeClarity==="Soft"||eyeClarity==="Muted")?"soft":"deep";

  let season="";

    if(value==="light") season=(chroma==="soft")?"Light Summer":"Cool Summer";
    else if(value==="medium") season=(chroma==="soft")?"Soft Summer":"True Summer";
    else season=(chroma==="deep")?"Deep Winter":"Cool Winter";
  }

  if(temperature==="warm"){
    if(value==="light") season=(chroma==="bright")?"Warm Spring":"Light Spring";
    else if(value==="medium") season=(chroma==="bright")?"True Spring":"Soft Autumn";
    else season=(chroma==="deep")?"Deep Autumn":"Warm Autumn";
  }

  if(temperature==="neutral"){
    if(value==="light") season=(chroma==="soft")?"Light Summer":"Light Spring";

    "Warm Autumn":["#c48a4a","#b97c3d","#a96f33","#e2b892","#f2d8bf"],
    "Deep Autumn":["#8b5a2b","#7a4f26","#6a4420","#c49a6c","#e0c3a3"],

    "Cool Winter":["#bcd0ff","#a8c0ff","#94b0ff","#d6e0ff","#e8eeff"],
    "Deep Winter":["#4a4e69","#2e3147","#1c1f33","#6b6f8c","#8d92b3"]
  };

  const chosenPalette=palettes[season]||["#c9d9f2"];

  /* Season card */
  seasonCard.innerHTML=`
    <h2>Your Season</h2>
    <div class="bullet">• <strong>${season}</strong></div>
    <div class="bullet">• Temperature: ${temperature}</div>
    <div class="bullet">• Value: ${value}</div>
    <div class="bullet">• Chroma: ${chroma}</div>
  `;
