<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Analysis</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f3d9ff, #f7e7ff);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        /* Back arrow */
        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: #d8b4fe;
            text-shadow: 0 0 10px rgba(216,180,254,0.7);
        }

        /* Title */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #d8b4fe;
            text-shadow: 0 0 12px rgba(216,180,254,0.6);
        }

        /* Upload boxes */
        .upload-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upload-box {
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            color: #d8b4fe;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .upload-box:hover {
            box-shadow: 0 0 20px rgba(216,180,254,0.5);
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        /* Button */
        .analyze-btn {
            margin-top: 20px;
            background: #d8b4fe;
            color: black;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .analyze-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(216,180,254,0.6);
        }

        /* Results */
        .results {
            margin-top: 30px;
            width: 85%;
            max-width: 600px;
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 18px;
            padding: 20px;
            color: #d8b4fe;
            text-align: left;
            display: none;
        }

        .results h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #e9d5ff;
        }

        .bullet {
            margin-left: 15px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Colour Analysis</h1>

    <div class="upload-container">

        <label class="upload-box">
            Upload your nails
            <input type="file" id="nailsInput" accept="image/*">
        </label>

        <label class="upload-box">
            Upload your outfit
            <input type="file" id="outfitInput" accept="image/*">
        </label>

        <button class="analyze-btn" onclick="showResults()">Show matching combos</button>
    </div>

    <div id="resultsBox" class="results">
        <h2>Your Matching Combos</h2>

        <div id="paletteSection"></div>
        <div id="nailIdeas"></div>
        <div id="outfitIdeas"></div>
        <div id="aestheticCombos"></div>
    </div>

<script>
    function showResults() {
        const resultsBox = document.getElementById("resultsBox");
        resultsBox.style.display = "block";

        // Real recommendations
        document.getElementById("paletteSection").innerHTML = `
            <div class="section-title">🎨 Color Palette</div>
            <div class="bullet">• Soft lilac + white + silver</div>
            <div class="bullet">• Nude beige + pastel purple</div>
            <div class="bullet">• Black + lavender accents</div>
        `;

        document.getElementById("nailIdeas").innerHTML = `
            <div class="section-title">💅 Nail Ideas That Match Your Outfit</div>
            <div class="bullet">• Pastel purple French tips</div>
            <div class="bullet">• Nude nails with lilac chrome</div>
            <div class="bullet">• White nails with lavender flowers</div>
        `;

        document.getElementById("outfitIdeas").innerHTML = `
            <div class="section-title">👗 Outfit Ideas That Match Your Nails</div>
            <div class="bullet">• White top + lilac skirt</div>
            <div class="bullet">• Black dress + pastel purple bag</div>
            <div class="bullet">• Beige sweater + lavender accessories</div>
        `;

        document.getElementById("aestheticCombos").innerHTML = `
            <div class="section-title">✨ Aesthetic Combos</div>
            <div class="bullet">• Soft girl: lilac cardigan + white pleated skirt</div>
            <div class="bullet">• Clean girl: beige outfit + lavender nails</div>
            <div class="bullet">• Coquette: lace top + pastel purple bow</div>
        `;
    }
</script>

</body>
</html>
