<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Analysis</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f8c8d8, #f7e7c9);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        /* Back arrow */
        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: gold;
            text-shadow: 0 0 10px rgba(255,215,0,0.7);
        }

        /* Title */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: gold;
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
        }

        /* Upload boxes */
        .upload-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upload-box {
            background: black;
            border: 2px solid gold;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            color: gold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .upload-box:hover {
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            transform: scale(1.02);
        }

        input[type="file"] {
            display: none;
        }

        /* Button */
        .analyze-btn {
            margin-top: 20px;
            background: gold;
            color: black;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .analyze-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.6);
        }

        /* Results */
        .results {
            margin-top: 30px;
            width: 85%;
            max-width: 600px;
            background: black;
            border: 2px solid gold;
            border-radius: 18px;
            padding: 20px;
            color: gold;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Colour Analysis</h1>

    <div class="upload-container">

        <label class="upload-box">
            Upload your nails
            <input type="file" id="nailsInput" accept="image/*">
        </label>

        <label class="upload-box">
            Upload your outfit
            <input type="file" id="outfitInput" accept="image/*">
        </label>

        <button class="analyze-btn" onclick="showResults()">Show matching combos</button>
    </div>

    <div id="resultsBox" class="results">
        <h2 style="margin-bottom: 10px;">Your Matching Combos</h2>
        <p>Here you will see:</p>
        <p>• Nail + outfit color palettes</p>
        <p>• Matching outfit ideas</p>
        <p>• Matching nail designs</p>
        <p>• Aesthetic combos (clean girl, coquette, classy, etc.)</p>
    </div>

<script>
    function showResults() {
        document.getElementById("resultsBox").style.display = "block";
    }
</script>

</body>
</html>
