<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Etternelle – Mirror</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Playfair Display", serif;
            background: linear-gradient(135deg, #f8c8d8, #f7e7c9);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Quote */
        .motto {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            font-size: 1.6rem;
            color: #000;
            text-shadow: 0 0 10px rgba(255,255,255,0.6);
        }

        /* Mirror wrapper */
        .mirror-wrapper {
            width: 75%;
            max-width: 900px;
            height: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Glowing mirror frame */
        .mirror-frame {
            width: 100%;
            height: 100%;
            border-radius: 55px;
            padding: 12px;
            background: linear-gradient(135deg, #ffd9a6, #ffb6c1);
            box-shadow: 
                0 0 25px rgba(255, 182, 193, 0.8),
                0 0 50px rgba(255, 182, 193, 0.6),
                0 0 80px rgba(255, 182, 193, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mirror-surface {
            width: 100%;
            height: 100%;
            border-radius: 45px;
            overflow: hidden;
            background: radial-gradient(circle at top, #ffffff, #d7d7d7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

       .mirror-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: none; /* normal camera view */
       }
        
        .mirror-placeholder {
            font-size: 1.2rem;
            color: rgba(0,0,0,0.6);
            text-align: center;
        }

        /* Down arrow */
        .arrow {
            position: absolute;
            bottom: 20px;
            font-size: 2.5rem;
            color: #000;
            cursor: pointer;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>

<body>

<div id="motto" class="motto"></div>

<div class="mirror-wrapper">
    <div class="mirror-frame">
        <div class="mirror-surface">
            <video id="cameraFeed" class="mirror-video" autoplay playsinline style="display:none;"></video>
            <div id="mirrorPlaceholder" class="mirror-placeholder">
                Welcome to Atelier Etternelle.
            </div>
        </div>
    </div>

    <!-- Arrow to next page -->
    <div class="arrow" onclick="window.location.href='menu.html'">⬇</div>
</div>

<script>
    /* Quote rotation */
    const mottos = [
        "Glow like it’s golden hour.",
        "Elegance is a habit.",
        "You are the main character.",
        "Soft glam, strong energy."
    ];
    let i = 0;
    const mottoEl = document.getElementById("motto");
    mottoEl.textContent = mottos[0];

    setInterval(() => {
        i = (i + 1) % mottos.length;
        mottoEl.textContent = mottos[i];
    }, 10000);

    /* Camera */
    const video = document.getElementById("cameraFeed");
    const placeholder = document.getElementById("mirrorPlaceholder");

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
            video.style.display = "block";
            placeholder.style.display = "none";
        })
        .catch(() => {
            placeholder.textContent = "Camera unavailable.";
        });
</script>

</body>
</html>
