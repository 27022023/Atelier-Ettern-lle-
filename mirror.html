<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Etternelle – Mirror</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "Playfair Display", serif;
        }

        /* CITY GRADIENTS */
        .city-paris     { background: linear-gradient(135deg, #f8c8d8, #f7e7c9); }
        .city-london    { background: linear-gradient(135deg, #b0c4de, #708090); }
        .city-dubai     { background: linear-gradient(135deg, #f7d9a6, #d4a762); }
        .city-newyork   { background: linear-gradient(135deg, #1c1f26, #4a5568); }
        .city-santorini { background: linear-gradient(135deg, #e3f2fd, #90caf9); }
        .city-milan     { background: linear-gradient(135deg, #f3e5ab, #d4a762); }
        .city-barcelona { background: linear-gradient(135deg, #ffcc80, #ff8a65); }
        .city-tokyo     { background: linear-gradient(135deg, #8e24aa, #3949ab); }
        .city-seoul     { background: linear-gradient(135deg, #b2ebf2, #f8bbd0); }
        .city-moscow    { background: linear-gradient(135deg, #bbdefb, #ef9a9a); }
        .city-munich    { background: linear-gradient(135deg, #a5d6a7, #81c784); }
        .city-prague    { background: linear-gradient(135deg, #ffe0b2, #bcaaa4); }

        .mirror-room {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Soft dreamy overlay */
        .overlay {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.15);
        }

        /* Motto – higher + softer + slower */
        .motto {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: #000;
            text-shadow: 0 0 12px rgba(255,255,255,0.6);
            letter-spacing: 1px;
            z-index: 10;
        }

        /* Mirror frame – more chicky, soft, rounded, glowing */
        .mirror-frame {
            width: 70%;
            max-width: 900px;
            height: 75%;
            border-radius: 55px;
            padding: 12px;
            background: linear-gradient(135deg, #d4a762, #f7e7c9);
            box-shadow: 0 0 40px rgba(212,167,98,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mirror-surface {
            width: 100%;
            height: 100%;
            border-radius: 45px;
            overflow: hidden;
            background: radial-gradient(circle at top, #ffffff, #d7d7d7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mirror-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mirror-placeholder {
            font-size: 1.2rem;
            color: rgba(0,0,0,0.6);
            text-align: center;
        }
    </style>
</head>

<body>

<div id="mirrorRoom" class="mirror-room">
    <div class="overlay"></div>

    <div id="motto" class="motto"></div>

    <div class="mirror-frame">
        <div class="mirror-surface">
            <video id="cameraFeed" class="mirror-video" autoplay playsinline style="display:none;"></video>
            <div id="mirrorPlaceholder" class="mirror-placeholder">
                Welcome to Atelier Etternelle.
            </div>
        </div>
    </div>
</div>

<script>
    /* CITY BACKGROUND */
    const room = document.getElementById("mirrorRoom");
    const city = (localStorage.getItem("selectedCity") || "").toLowerCase().replace(" ", "");
    room.classList.add("city-" + city);

    /* MOTTO ROTATION – slower + softer */
    const mottos = [
        "Glow like it’s golden hour.",
        "Elegance is a habit.",
        "You are the main character.",
        "Soft glam, strong energy."
        "Elegance is when the outside is as beautiful as the inside"
        " After women, flowers are the most delicate creations"
        " If you want to be an original be ready to be copied"
        "Beauty means that you are yourself"
    ];
    let i = 0;
    const mottoEl = document.getElementById("motto");
    mottoEl.textContent = mottos[0];

    setInterval(() => {
        i = (i + 1) % mottos.length;
        mottoEl.textContent = mottos[i];
    }, 12000); // 12 seconds

    /* CAMERA */
    const video = document.getElementById("cameraFeed");
    const placeholder = document.getElementById("mirrorPlaceholder");

    navigator.mediaDevices?.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
            video.style.display = "block";
            placeholder.style.display = "none";
        })
        .catch(() => {});
</script>

</body>
</html>
