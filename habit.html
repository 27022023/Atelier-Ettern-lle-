<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wellness Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  width:100vw;
  background:linear-gradient(135deg,#4b0f1f,#6d1a2f,#8a243d,#b33a52);
  font-family:"Playfair Display",serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
  color:#f7e7c9;
}

/* back arrow */
.back-arrow{
  position:fixed;
  top:20px;
  left:20px;
  font-size:2.2rem;
  cursor:pointer;
  color:#f7e7c9;
  text-shadow:0 0 10px rgba(247,231,201,0.6);
}

/* title */
h1{
  font-size:2.4rem;
  margin-bottom:10px;
  color:#f7e7c9;
  text-shadow:0 0 12px rgba(247,231,201,0.6);
  text-align:center;
}

/* section card */
.card{
  width:85%;
  max-width:650px;
  background:#1a0a0f;
  border:2px solid #f7e7c9;
  border-radius:18px;
  padding:20px;
  margin-top:30px;
}

.card-title{
  font-size:1.6rem;
  margin-bottom:10px;
  color:#f5d487;
}

/* inputs */
input, select, textarea{
  padding:12px;
  border-radius:12px;
  border:2px solid #f7e7c9;
  background:#1a0a0f;
  color:#f7e7c9;
  font-size:1.1rem;
}

textarea{
  resize:none;
}

/* buttons */
.btn{
  background:#f5d487;
  color:black;
  padding:12px;
  border-radius:12px;
  font-size:1.1rem;
  font-weight:600;
  cursor:pointer;
  border:none;
  width:100%;
  margin-top:10px;
  box-shadow:0 0 10px rgba(247,231,201,0.6);
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(247,231,201,0.8);
}

/* habit tracker */
.habit-card{
  background:#1a0a0f;
  border:2px solid #f7e7c9;
  border-radius:18px;
  padding:20px;
  margin-top:20px;
  position:relative;
}

.delete-icon,.edit-icon{
  position:absolute;
  top:12px;
  font-size:1.3rem;
  cursor:pointer;
  color:#f5d487;
}

.delete-icon{right:12px;}
.edit-icon{right:40px;}

.progress-bar{
  width:100%;
  height:14px;
  background:#3a1a22;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #f7e7c9;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#f5d487;
  transition:width 0.3s ease;
}

/* to-do */
.todo-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #f7e7c9;
  gap:10px;
}

.todo-complete{
  text-decoration:line-through;
  opacity:0.6;
}

.todo-actions{
  display:flex;
  gap:8px;
}

.todo-delete,.todo-edit{
  cursor:pointer;
  color:#f5d487;
  font-size:1.3rem;
}

/* mood tracker */
.mood-options{
  display:flex;
  gap:15px;
  font-size:2rem;
  cursor:pointer;
}

.mood-selected{
  transform:scale(1.3);
}

/* calendar */
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-top:10px;
}

.calendar-day{
  padding:10px;
  background:#3a1a22;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  border:1px solid #f7e7c9;
}

.calendar-day:hover{
  background:#5a2230;
}

.calendar-day.selected{
  background:#f5d487;
  color:#1a0a0f;
}

/* history */
.history-entry{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #f7e7c9;
  background:#2a1017;
  font-size:0.95rem;
}
.history-entry-title{
  font-weight:600;
  margin-bottom:6px;
  color:#f5d487;
}
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Wellness Dashboard</h1>

<!-- HABIT TRACKER -->
<div class="card">
  <div class="card-title">Habit Tracker</div>

  <div id="habitContainer"></div>

  <div style="display:flex;gap:10px;margin-top:15px;">
    <input id="customHabitInput" placeholder="Add a habit...">
    <button class="btn" style="width:auto;padding:10px 20px;" onclick="addCustomHabit()">Add</button>
  </div>
</div>

<!-- TO-DO LIST -->
<div class="card">
  <div class="card-title">To‑Do List</div>

  <div style="display:flex;gap:10px;">
    <input id="todoInput" placeholder="Add a task...">
    <button class="btn" style="width:auto;padding:10px 20px;" onclick="addTodo()">Add</button>
  </div>

  <div id="todoList" style="margin-top:15px;"></div>
</div>

<!-- JOURNAL -->
<div class="card">
  <div class="card-title">Daily Journal</div>
  <textarea id="journalBox" style="width:100%;height:150px;" placeholder="Write your thoughts..."></textarea>
</div>

<!-- SLEEP TRACKER -->
<div class="card">
  <div class="card-title">Sleep Tracker</div>

  <label>Hours Slept</label>
  <input id="sleepHours" type="number" min="0" max="24" placeholder="e.g., 7.5">

  <label style="margin-top:10px;">Sleep Quality</label>
  <select id="sleepQuality">
    <option value="">-- Select --</option>
    <option>Excellent</option>
    <option>Good</option>
    <option>Okay</option>
    <option>Poor</option>
  </select>

  <label style="margin-top:10px;">Notes</label>
  <textarea id="sleepNotes" style="width:100%;height:100px;"></textarea>

  <button class="btn" onclick="saveSleep()">Save Sleep Log</button>

  <div id="sleepSummary" style="margin-top:15px;"></div>
</div>

<!-- MOOD TRACKER -->
<div class="card">
  <div class="card-title">Mood Tracker</div>

  <div class="mood-options" id="moodOptions">
    <span onclick="setMood('😄')">😄</span>
    <span onclick="setMood('😊')">😊</span>
    <span onclick="setMood('😐')">😐</span>
    <span onclick="setMood('😔')">😔</span>
    <span onclick="setMood('😫')">😫</span>
  </div>

  <div id="moodDisplay" style="margin-top:10px;font-size:1.2rem;"></div>
</div>

<!-- CALENDAR -->
<div class="card">
  <div class="card-title">Monthly Calendar</div>

  <div id="calendarGrid" class="calendar-grid"></div>

  <textarea id="calendarNote" style="width:100%;height:80px;margin-top:15px;" placeholder="Write a note for the selected date..."></textarea>
  <button class="btn" style="margin-top:10px;" onclick="addCalendarNote()">Add Note to Day</button>

  <div id="calendarNotesList" style="margin-top:15px;font-size:0.95rem;"></div>
</div>

<!-- HISTORY -->
<div class="card">
  <div class="card-title">Daily History</div>
  <div id="historyContainer"></div>
</div>

<script>
/* --------- DATE & GLOBAL STATE --------- */
const todayStr=new Date().toDateString();

let dailyHistory=JSON.parse(localStorage.getItem("dailyHistory"))||[];
let moodByDate=JSON.parse(localStorage.getItem("moodByDate"))||{};
let progressHistory=JSON.parse(localStorage.getItem("progressHistory"))||{};
let sleepData=JSON.parse(localStorage.getItem("sleepData"))||{};
let lastDate=localStorage.getItem("lastDate");

/* --------- DAILY RESET & HISTORY SNAPSHOT --------- */
if(lastDate && lastDate!==todayStr){
  const snapshot={
    date:lastDate,
    mood:moodByDate[lastDate]||"",
    sleep:sleepData[lastDate]||null,
    habits:progressHistory[lastDate]||null
  };
  dailyHistory.push(snapshot);
  localStorage.setItem("dailyHistory",JSON.stringify(dailyHistory));

  // reset trackers for new day
  localStorage.setItem("progress",JSON.stringify({}));
}
localStorage.setItem("lastDate",todayStr);

/* ---------------- HABITS ---------------- */

const defaultHabits=[
  {id:"water",title:"💧 Water Intake"},
  {id:"sleep",title:"😴 Sleep Hours"},
  {id:"workout",title:"🏋️‍♀️ Workout"},
  {id:"mood",title:"🌈 Mood"},
  {id:"todo",title:"✨ To‑Do Progress"},
  {id:"goals",title:"⭐ Daily Goals"}
];

let habits=JSON.parse(localStorage.getItem("habits"))||defaultHabits;
let progress=JSON.parse(localStorage.getItem("progress"))||{};

function renderHabits(){
  const container=document.getElementById("habitContainer");
  container.innerHTML="";

  habits.forEach(h=>{
    const value=progress[h.id]||0;

    container.innerHTML+=`
      <div class="habit-card">
        <div class="edit-icon" onclick="editHabit('${h.id}')">✏️</div>
        <div class="delete-icon" onclick="deleteHabit('${h.id}')">🗑️</div>
        <div style="font-size:1.3rem;margin-bottom:5px;">${h.title}</div>
        <div class="progress-bar"><div id="${h.id}Fill" class="progress-fill" style="width:${value}%"></div></div>
        <button class="btn" onclick="increase('${h.id}')">Add progress</button>
      </div>
    `;
  });
}

function increase(id){
  progress[id]=(progress[id]||0)+10;
  if(progress[id]>100) progress[id]=100;
  document.getElementById(id+"Fill").style.width=progress[id]+"%";
  localStorage.setItem("progress",JSON.stringify(progress));

  progressHistory[todayStr]=progress;
  localStorage.setItem("progressHistory",JSON.stringify(progressHistory));
}

function deleteHabit(id){
  habits=habits.filter(h=>h.id!==id);
  delete progress[id];
  localStorage.setItem("habits",JSON.stringify(habits));
  localStorage.setItem("progress",JSON.stringify(progress));
  renderHabits();
}

function editHabit(id){
  const habit=habits.find(h=>h.id===id);
  if(!habit) return;
  const newTitle=prompt("Edit habit name:",habit.title.replace(/^✨ /,""));
  if(newTitle && newTitle.trim()){
    habit.title="✨ "+newTitle.trim();
    localStorage.setItem("habits",JSON.stringify(habits));
    renderHabits();
  }
}

function addCustomHabit(){
  const input=document.getElementById("customHabitInput");
  const name=input.value.trim();
  if(!name) return;

  const id=name.toLowerCase().replace(/ /g,"_");
  habits.push({id,title:"✨ "+name});
  localStorage.setItem("habits",JSON.stringify(habits));

  input.value="";
  renderHabits();
}

/* ---------------- TO-DO ---------------- */

let todos=JSON.parse(localStorage.getItem("todos"))||[];

function renderTodos(){
  const list=document.getElementById("todoList");
  list.innerHTML="";

  todos.forEach((t,i)=>{
    list.innerHTML+=`
      <div class="todo-item">
        <span class="${t.done?'todo-complete':''}" onclick="toggleTodo(${i})">${t.text}</span>
        <div class="todo-actions">
          <span class="todo-edit" onclick="editTodo(${i})">✏️</span>
          <span class="todo-delete" onclick="deleteTodo(${i})">🗑️</span>
        </div>
      </div>
    `;
  });
}

function addTodo(){
  const input=document.getElementById("todoInput");
  const text=input.value.trim();
  if(!text) return;

  todos.push({text,done:false});
  localStorage.setItem("todos",JSON.stringify(todos));

  input.value="";
  renderTodos();
}

function toggleTodo(i){
  todos[i].done=!todos[i].done;
  localStorage.setItem("todos",JSON.stringify(todos));
  renderTodos();
}

function deleteTodo(i){
  todos.splice(i,1);
  localStorage.setItem("todos",JSON.stringify(todos));
  renderTodos();
}

function editTodo(i){
  const current=todos[i].text;
  const updated=prompt("Edit task:",current);
  if(updated && updated.trim()){
    todos[i].text=updated.trim();
    localStorage.setItem("todos",JSON.stringify(todos));
    renderTodos();
  }
}

/* ---------------- JOURNAL ---------------- */

let journal=JSON.parse(localStorage.getItem("journal"))||{};
const journalBox=document.getElementById("journalBox");
const journalDate=todayStr;

journalBox.value=journal[journalDate]||"";

journalBox.addEventListener("input",()=>{
  journal[journalDate]=journalBox.value;
  localStorage.setItem("journal",JSON.stringify(journal));
});

/* ---------------- SLEEP TRACKER ---------------- */

const sleepHoursInput=document.getElementById("sleepHours");
const sleepQualitySelect=document.getElementById("sleepQuality");
const sleepNotesInput=document.getElementById("sleepNotes");

if(sleepData[todayStr]){
  sleepHoursInput.value=sleepData[todayStr].hours||"";
  sleepQualitySelect.value=sleepData[todayStr].quality||"";
  sleepNotesInput.value=sleepData[todayStr].notes||"";
}

function saveSleep(){
  const hours=parseFloat(sleepHoursInput.value);
  const quality=sleepQualitySelect.value;
  const notes=sleepNotesInput.value;

  if(!hours||!quality){
    alert("Please fill in hours and quality.");
    return;
  }

  sleepData[todayStr]={hours,quality,notes};
  localStorage.setItem("sleepData",JSON.stringify(sleepData));

  updateSleepSummary();
}

function updateSleepSummary(){
  const box=document.getElementById("sleepSummary");
  const entries=Object.values(sleepData);

  if(entries.length===0){
    box.innerHTML="No sleep data yet.";
    return;
  }

  const avg=(entries.reduce((a,b)=>a+b.hours,0)/entries.length).toFixed(1);
  const best=[...entries].sort((a,b)=>b.hours-a.hours)[0];

  box.innerHTML=`
    <div>Average hours: ${avg} hrs</div>
    <div>Best night: ${best.hours} hrs (${best.quality})</div>
    <div>Total nights logged: ${entries.length}</div>
  `;
}

updateSleepSummary();

/* ---------------- MOOD TRACKER ---------------- */

let mood=moodByDate[todayStr]||"";
const moodDisplay=document.getElementById("moodDisplay");

if(mood){
  moodDisplay.textContent="Today's mood: "+mood;
}

function setMood(m){
  mood=m;
  moodByDate[todayStr]=m;
  localStorage.setItem("moodByDate",JSON.stringify(moodByDate));
  moodDisplay.textContent="Today's mood: "+m;
}

/* ---------------- CALENDAR ---------------- */

let calendarNotes=JSON.parse(localStorage.getItem("calendarNotes"))||{};
const calendarGrid=document.getElementById("calendarGrid");
const noteBox=document.getElementById("calendarNote");
const notesList=document.getElementById("calendarNotesList");
let selectedDate=null;

function renderCalendar(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();

  const firstDay=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();

  calendarGrid.innerHTML="";

  for(let i=0;i<firstDay;i++){
    calendarGrid.innerHTML+=`<div></div>`;
  }

  for(let d=1;d<=days;d++){
    const dateKey=`${year}-${month+1}-${d}`;
    calendarGrid.innerHTML+=`
      <div class="calendar-day" id="day-${dateKey}" onclick="selectDate('${dateKey}')">${d}</div>
    `;
  }
}

function selectDate(dateKey){
  selectedDate=dateKey;
  document.querySelectorAll(".calendar-day").forEach(el=>el.classList.remove("selected"));
  const el=document.getElementById("day-"+dateKey);
  if(el) el.classList.add("selected");
  noteBox.value="";
  renderCalendarNotes();
}

function addCalendarNote(){
  if(!selectedDate){
    alert("Please select a date first.");
    return;
  }
  const text=noteBox.value.trim();
  if(!text) return;

  if(!Array.isArray(calendarNotes[selectedDate])){
    calendarNotes[selectedDate]=[];
  }
  calendarNotes[selectedDate].push(text);
  localStorage.setItem("calendarNotes",JSON.stringify(calendarNotes));
  noteBox.value="";
  renderCalendarNotes();
}

function renderCalendarNotes(){
  notesList.innerHTML="";
  if(!selectedDate) return;

  const notes=calendarNotes[selectedDate]||[];
  if(notes.length===0){
    notesList.innerHTML="<div>No notes for this day yet.</div>";
    return;
  }

  notes.forEach((n,i)=>{
    notesList.innerHTML+=`<div>• ${n}</div>`;
  });
}

/* ---------------- HISTORY RENDER ---------------- */

function renderHistory(){
  const container=document.getElementById("historyContainer");
  container.innerHTML="";

  if(dailyHistory.length===0){
    container.innerHTML="<div>No history yet. It will appear here as days pass.</div>";
    return;
  }

  [...dailyHistory].reverse().forEach(entry=>{
    const habitsText=entry.habits
      ? Object.entries(entry.habits).map(([k,v])=>`${k}: ${v}%`).join(", ")
      : "No habit data";

    const sleepText=entry.sleep
      ? `${entry.sleep.hours} hrs (${entry.sleep.quality})`
      : "No sleep data";

    const notes=`
      <div class="history-entry">
        <div class="history-entry-title">${entry.date}</div>
        <div>Mood: ${entry.mood || "No mood logged"}</div>
        <div>Sleep: ${sleepText}</div>
        <div>Habits: ${habitsText}</div>
      </div>
    `;
    container.innerHTML+=notes;
  });
}

/* INIT */
renderHabits();
renderTodos();
renderCalendar();
renderHistory();
</script>

</body>
</html>
