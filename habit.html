<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f8c8d8, #f7e7c9);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            overflow-y: auto;
        }

        /* Back arrow */
        .back-arrow {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: gold;
            text-shadow: 0 0 10px rgba(255,215,0,0.7);
        }

        /* Title */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: gold;
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
        }

        /* Habit container */
        .habit-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Habit card */
        .habit-card {
            background: black;
            border: 2px solid gold;
            border-radius: 18px;
            padding: 20px;
            color: gold;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .habit-title {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            height: 14px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid gold;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: gold;
            transition: width 0.3s ease;
        }

        /* Button */
        .habit-btn {
            background: gold;
            color: black;
            padding: 10px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .habit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.6);
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Habit Tracker</h1>

    <div class="habit-container">

        <!-- Water -->
        <div class="habit-card">
            <div class="habit-title">💧 Water Intake</div>
            <div class="progress-bar"><div id="waterFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('waterFill')">Add a glass</button>
        </div>

        <!-- Sleep -->
        <div class="habit-card">
            <div class="habit-title">😴 Sleep Hours</div>
            <div class="progress-bar"><div id="sleepFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('sleepFill')">Add 1 hour</button>
        </div>

        <!-- Workout -->
        <div class="habit-card">
            <div class="habit-title">🏋️‍♀️ Workout</div>
            <div class="progress-bar"><div id="workoutFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('workoutFill')">Add 10 min</button>
        </div>

        <!-- Mood -->
        <div class="habit-card">
            <div class="habit-title">🌈 Mood</div>
            <div class="progress-bar"><div id="moodFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('moodFill')">Feeling good</button>
        </div>

        <!-- To-do -->
        <div class="habit-card">
            <div class="habit-title">✨ To‑Do Progress</div>
            <div class="progress-bar"><div id="todoFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('todoFill')">Complete task</button>
        </div>

        <!-- Daily Goals -->
        <div class="habit-card">
            <div class="habit-title">⭐ Daily Goals</div>
            <div class="progress-bar"><div id="goalsFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('goalsFill')">Goal achieved</button>
        </div>

    </div>

<script>
    function increase(id) {
        const bar = document.getElementById(id);
        let current = parseInt(bar.style.width) || 0;
        if (current < 100) {
            bar.style.width = (current + 10) + "%";
        }
    }
</script>

</body>
</html>
