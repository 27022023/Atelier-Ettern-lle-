<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wellness Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  width:100vw;
  background:linear-gradient(135deg,#4b0f1f,#6d1a2f,#8a243d,#b33a52);
  font-family:"Playfair Display",serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
  color:#f7e7c9;
}

/* back arrow */
.back-arrow{
  position:fixed;
  top:20px;
  left:20px;
  font-size:2.2rem;
  cursor:pointer;
  color:#f7e7c9;
  text-shadow:0 0 10px rgba(247,231,201,0.6);
}

/* title */
h1{
  font-size:2.4rem;
  margin-bottom:10px;
  color:#f7e7c9;
  text-shadow:0 0 12px rgba(247,231,201,0.6);
}

/* section card */
.card{
  width:85%;
  max-width:650px;
  background:#1a0a0f;
  border:2px solid #f7e7c9;
  border-radius:18px;
  padding:20px;
  margin-top:30px;
}

.card-title{
  font-size:1.6rem;
  margin-bottom:10px;
  color:#f5d487;
}

/* inputs */
input, select, textarea{
  padding:12px;
  border-radius:12px;
  border:2px solid #f7e7c9;
  background:#1a0a0f;
  color:#f7e7c9;
  font-size:1.1rem;
}

textarea{
  resize:none;
}

/* buttons */
.btn{
  background:#f5d487;
  color:black;
  padding:12px;
  border-radius:12px;
  font-size:1.1rem;
  font-weight:600;
  cursor:pointer;
  border:none;
  width:100%;
  margin-top:10px;
  box-shadow:0 0 10px rgba(247,231,201,0.6);
}

.btn:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(247,231,201,0.8);
}

/* habit tracker */
.habit-card{
  background:#1a0a0f;
  border:2px solid #f7e7c9;
  border-radius:18px;
  padding:20px;
  margin-top:20px;
  position:relative;
}

.delete-icon{
  position:absolute;
  top:12px;
  right:12px;
  font-size:1.3rem;
  cursor:pointer;
  color:#f5d487;
}

.progress-bar{
  width:100%;
  height:14px;
  background:#3a1a22;
  border-radius:10px;
  overflow:hidden;
  border:1px solid #f7e7c9;
}

.progress-fill{
  height:100%;
  width:0%;
  background:#f5d487;
  transition:width 0.3s ease;
}

/* to-do */
.todo-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #f7e7c9;
}

.todo-complete{
  text-decoration:line-through;
  opacity:0.6;
}

.todo-delete{
  cursor:pointer;
  color:#f5d487;
  font-size:1.3rem;
}

/* mood tracker */
.mood-options{
  display:flex;
  gap:15px;
  font-size:2rem;
  cursor:pointer;
}

.mood-selected{
  transform:scale(1.3);
}

/* calendar */
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-top:10px;
}

.calendar-day{
  padding:10px;
  background:#3a1a22;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  border:1px solid #f7e7c9;
}

.calendar-day:hover{
  background:#5a2230;
}
</style>
</head>

<body>

<div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

<h1>Wellness Dashboard</h1>

<!-- HABIT TRACKER -->
<div class="card">
  <div class="card-title">Habit Tracker</div>

  <div id="habitContainer"></div>

  <div style="display:flex;gap:10px;margin-top:15px;">
    <input id="customHabitInput" placeholder="Add a habit...">
    <button class="btn" style="width:auto;padding:10px 20px;" onclick="addCustomHabit()">Add</button>
  </div>
</div>

<!-- TO-DO LIST -->
<div class="card">
  <div class="card-title">To‑Do List</div>

  <div style="display:flex;gap:10px;">
    <input id="todoInput" placeholder="Add a task...">
    <button class="btn" style="width:auto;padding:10px 20px;" onclick="addTodo()">Add</button>
  </div>

  <div id="todoList" style="margin-top:15px;"></div>
</div>

<!-- JOURNAL -->
<div class="card">
  <div class="card-title">Daily Journal</div>
  <textarea id="journalBox" style="width:100%;height:150px;" placeholder="Write your thoughts..."></textarea>
</div>

<!-- SLEEP TRACKER -->
<div class="card">
  <div class="card-title">Sleep Tracker</div>

  <label>Hours Slept</label>
  <input id="sleepHours" type="number" min="0" max="24" placeholder="e.g., 7.5">

  <label style="margin-top:10px;">Sleep Quality</label>
  <select id="sleepQuality">
    <option value="">-- Select --</option>
    <option>Excellent</option>
    <option>Good</option>
    <option>Okay</option>
    <option>Poor</option>
  </select>

  <label style="margin-top:10px;">Notes</label>
  <textarea id="sleepNotes" style="width:100%;height:100px;"></textarea>

  <button class="btn" onclick="saveSleep()">Save Sleep Log</button>

  <div id="sleepSummary" style="margin-top:15px;"></div>
</div>

<!-- MOOD TRACKER -->
<div class="card">
  <div class="card-title">Mood Tracker</div>

  <div class="mood-options" id="moodOptions">
    <span onclick="setMood('😄')">😄</span>
    <span onclick="setMood('😊')">😊</span>
    <span onclick="setMood('😐')">😐</span>
    <span onclick="setMood('😔')">😔</span>
    <span onclick="setMood('😫')">😫</span>
  </div>

  <div id="moodDisplay" style="margin-top:10px;font-size:1.2rem;"></div>
</div>

<!-- CALENDAR -->
<div class="card">
  <div class="card-title">Monthly Calendar</div>

  <div id="calendarGrid" class="calendar-grid"></div>

  <textarea id="calendarNote" style="width:100%;height:100px;margin-top:15px;" placeholder="Click a date to add a note..."></textarea>
</div>

<script>
/* ---------------- HABITS ---------------- */

const defaultHabits=[
  {id:"water",title:"💧 Water Intake"},
  {id:"sleep",title:"😴 Sleep Hours"},
  {id:"workout",title:"🏋️‍♀️ Workout"},
  {id:"mood",title:"🌈 Mood"},
  {id:"todo",title:"✨ To‑Do Progress"},
  {id:"goals",title:"⭐ Daily Goals"}
];

let habits=JSON.parse(localStorage.getItem("habits"))||defaultHabits;
let progress=JSON.parse(localStorage.getItem("progress"))||{};

function renderHabits(){
  const container=document.getElementById("habitContainer");
  container.innerHTML="";

  habits.forEach(h=>{
    const value=progress[h.id]||0;

    container.innerHTML+=`
      <div class="habit-card">
        <div class="delete-icon" onclick="deleteHabit('${h.id}')">🗑️</div>
        <div style="font-size:1.3rem;margin-bottom:5px;">${h.title}</div>
        <div class="progress-bar"><div id="${h.id}Fill" class="progress-fill" style="width:${value}%"></div></div>
        <button class="btn" onclick="increase('${h.id}')">Add progress</button>
      </div>
    `;
  });
}

function increase(id){
  progress[id]=(progress[id]||0)+10;
  if(progress[id]>100) progress[id]=100;
  document.getElementById(id+"Fill").style.width=progress[id]+"%";
  localStorage.setItem("progress",JSON.stringify(progress));
}

function deleteHabit(id){
  habits=habits.filter(h=>h.id!==id);
  delete progress[id];
  localStorage.setItem("habits",JSON.stringify(habits));
  localStorage.setItem("progress",JSON.stringify(progress));
  renderHabits();
}

function addCustomHabit(){
  const input=document.getElementById("customHabitInput");
  const name=input.value.trim();
  if(!name) return;

  const id=name.toLowerCase().replace(/ /g,"_");
  habits.push({id,title:"✨ "+name});
  localStorage.setItem("habits",JSON.stringify(habits));

  input.value="";
  renderHabits();
}

/* ---------------- TO-DO ---------------- */

let todos=JSON.parse(localStorage.getItem("todos"))||[];

function renderTodos(){
  const list=document.getElementById("todoList");
  list.innerHTML="";

  todos.forEach((t,i)=>{
    list.innerHTML+=`
      <div class="todo-item">
        <span class="${t.done?'todo-complete':''}" onclick="toggleTodo(${i})">${t.text}</span>
        <span class="todo-delete" onclick="deleteTodo(${i})">🗑️</span>
      </div>
    `;
  });
}

function addTodo(){
  const input=document.getElementById("todoInput");
  const text=input.value.trim();
  if(!text) return;

  todos.push({text,done:false});
  localStorage.setItem("todos",JSON.stringify(todos));

  input.value="";
  renderTodos();
}

function toggleTodo(i){
  todos[i].done=!todos[i].done;
  localStorage.setItem("todos",JSON.stringify(todos));
  renderTodos();
}

function deleteTodo(i){
  todos.splice(i,1);
  localStorage.setItem("todos",JSON.stringify(todos));
  renderTodos();
}

/* ---------------- JOURNAL ---------------- */

let journal=JSON.parse(localStorage.getItem("journal"))||{};
const journalBox=document.getElementById("journalBox");
const journalDate=new Date().toDateString();

journalBox.value=journal[journalDate]||"";

journalBox.addEventListener("input",()=>{
  journal[journalDate]=journalBox.value;
  localStorage.setItem("journal",JSON.stringify(journal));
});

/* ---------------- SLEEP TRACKER ---------------- */

let sleepData=JSON.parse(localStorage.getItem("sleepData"))||{};
const today=new Date().toDateString();

if(sleepData[today]){
  document.getElementById("sleepHours").value=sleepData[today].hours||"";
  document.getElementById("sleepQuality").value=sleepData[today].quality||"";
  document.getElementById("sleepNotes").value=sleepData[today].notes||"";
}

function saveSleep(){
  const hours=parseFloat(document.getElementById("sleepHours").value);
  const quality=document.getElementById("sleepQuality").value;
  const notes=document.getElementById("sleepNotes").value;

  if(!hours||!quality){
    alert("Please fill in hours and quality.");
    return;
  }

  sleepData[today]={hours,quality,notes};
  localStorage.setItem("sleepData",JSON.stringify(sleepData));

  updateSleepSummary();
}

function updateSleepSummary(){
  const box=document.getElementById("sleepSummary");
  const entries=Object.values(sleepData);

  if(entries.length===0){
    box.innerHTML="No sleep data yet.";
    return;
  }

  const avg=(entries.reduce((a,b)=>a+b.hours,0)/entries.length).toFixed(1);
  const best=entries.sort((a,b)=>b.hours-a.hours)[0];

  box.innerHTML=`
    <div>Average hours: ${avg} hrs</div>
    <div>Best night: ${best.hours} hrs (${best.quality})</div>
    <div>Total nights logged: ${entries.length}</div>
  `;
}

updateSleepSummary();

/* ---------------- MOOD TRACKER ---------------- */

let mood=localStorage.getItem("mood")||"";
const moodDisplay=document.getElementById("moodDisplay");

if(mood){
  moodDisplay.textContent="Today's mood: "+mood;
}

function setMood(m){
  mood=m;
  localStorage.setItem("mood",m);
  moodDisplay.textContent="Today's mood: "+m;
}

/* ---------------- CALENDAR ---------------- */

let calendarNotes=JSON.parse(localStorage.getItem("calendarNotes"))||{};
const calendarGrid=document.getElementById("calendarGrid");
const noteBox=document.getElementById("calendarNote");
let selectedDate=null;

function renderCalendar(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();

  const firstDay=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();

  calendarGrid.innerHTML="";

  for(let i=0;i<firstDay;i++){
    calendarGrid.innerHTML+=`<div></div>`;
  }

  for(let d=1;d<=days;d++){
    calendarGrid.innerHTML+=`
      <div class="calendar-day" onclick="selectDate(${d})">${d}</div>
    `;
  }
}

function selectDate(day){
  const now=new Date();
  selectedDate=`${now.getFullYear()}-${now.getMonth()+1}-${day}`;
  noteBox.value=calendarNotes[selectedDate]||"";
}

noteBox.addEventListener("input",()=>{
  if(selectedDate){
    calendarNotes[selectedDate]=noteBox.value;
    localStorage.setItem("calendarNotes",JSON.stringify(calendarNotes));
  }
});

/* INIT */
renderHabits();
renderTodos();
renderCalendar();
</script>

</body>
</html>
