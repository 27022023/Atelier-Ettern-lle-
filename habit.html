<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f3d9ff, #f7e7ff);
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .back-arrow {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: #d8b4fe;
            text-shadow: 0 0 10px rgba(216,180,254,0.7);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #d8b4fe;
            text-shadow: 0 0 12px rgba(216,180,254,0.6);
        }

        .habit-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .habit-card {
            background: black;
            border: 2px solid #d8b4fe;
            border-radius: 18px;
            padding: 20px;
            color: #d8b4fe;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .habit-title {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 14px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #d8b4fe;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #d8b4fe;
            transition: width 0.3s ease;
        }

        .habit-btn {
            background: #d8b4fe;
            color: black;
            padding: 10px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
        }

        .habit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(216,180,254,0.6);
        }

        .message {
            font-size: 1rem;
            opacity: 0.9;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="back-arrow" onclick="window.location.href='menu.html'">←</div>

    <h1>Habit Tracker</h1>

    <div class="habit-container">

        <!-- Water -->
        <div class="habit-card">
            <div class="habit-title">💧 Water Intake</div>
            <div class="progress-bar"><div id="waterFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('waterFill', 'waterMsg')">Add a glass</button>
            <div id="waterMsg" class="message"></div>
        </div>

        <!-- Sleep -->
        <div class="habit-card">
            <div class="habit-title">😴 Sleep Hours</div>
            <div class="progress-bar"><div id="sleepFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('sleepFill', 'sleepMsg')">Add 1 hour</button>
            <div id="sleepMsg" class="message"></div>
        </div>

        <!-- Workout -->
        <div class="habit-card">
            <div class="habit-title">🏋️‍♀️ Workout</div>
            <div class="progress-bar"><div id="workoutFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('workoutFill', 'workoutMsg')">Add 10 min</button>
            <div id="workoutMsg" class="message"></div>
        </div>

        <!-- Mood -->
        <div class="habit-card">
            <div class="habit-title">🌈 Mood</div>
            <div class="progress-bar"><div id="moodFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('moodFill', 'moodMsg')">Feeling good</button>
            <div id="moodMsg" class="message"></div>
        </div>

        <!-- To-do -->
        <div class="habit-card">
            <div class="habit-title">✨ To‑Do Progress</div>
            <div class="progress-bar"><div id="todoFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('todoFill', 'todoMsg')">Complete task</button>
            <div id="todoMsg" class="message"></div>
        </div>

        <!-- Daily Goals -->
        <div class="habit-card">
            <div class="habit-title">⭐ Daily Goals</div>
            <div class="progress-bar"><div id="goalsFill" class="progress-fill"></div></div>
            <button class="habit-btn" onclick="increase('goalsFill', 'goalsMsg')">Goal achieved</button>
            <div id="goalsMsg" class="message"></div>
        </div>

    </div>

<script>
    function increase(id, msgId) {
        const bar = document.getElementById(id);
        const msg = document.getElementById(msgId);

        let current = parseInt(bar.style.width) || 0;

        if (current < 100) {
            bar.style.width = (current + 10) + "%";
        }

        // Motivational messages
        const messages = [
            "You're doing amazing 💜",
            "Keep going, you're glowing ✨",
            "Small steps = big progress 🌸",
            "Proud of you already 💫",
            "You're building healthy habits 💕"
        ];

        msg.textContent = messages[Math.floor(Math.random() * messages.length)];
    }
</script>

</body>
</html>
