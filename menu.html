<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick a Service</title>
<link rel="icon" type="image/png" href="icon_1772911913761.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #f7e7c9, #f1d9a9); /* champagne gold */
            font-family: "Playfair Display", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        /* Back arrow */
        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2.2rem;
            cursor: pointer;
            color: #4a4a4a;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #4a4a4a;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .menu-container {
            width: 85%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .service-box {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 1.3rem;
            text-align: center;
            color: #2e2e2e;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            background: linear-gradient(135deg, #d9d9d9, #f0f0ff); /* metallic silver + lavender */
            border: 1px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
        }

        .service-box:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <!-- Back arrow -->
    <div class="back-arrow" onclick="window.location.href='mirror.html'">←</div>

    <h1>Pick a service!!</h1>

    <div class="menu-container">

        <div class="service-box" onclick="window.location.href='colour.html'">
            Colour Analysis
        </div>

        <div class="service-box" onclick="window.location.href='style.html'">
            Style Helper
        </div>

        <div class="service-box" onclick="window.location.href='photo.html'">
            Photo Ideas
        </div>

        <div class="service-box" onclick="window.location.href='beauty.html'">
            Beauty Guide
        </div>

        <div class="service-box" onclick="window.location.href='habit.html'">
            Habit Tracker
        </div>

        <div class="service-box" onclick="window.location.href='selfcare.html'">
            Self‑Care
        </div>

        <div class="service-box" onclick="window.location.href='skincare.html'">
            Skincare Helper
        </div>

        <div class="service-box" onclick="window.location.href='nails.html'">
            Nail Inspiration
        </div>

        <div class="service-box" onclick="window.location.href='glowup.html'">
            Glow‑Up Challenges
        </div>

        <div class="service-box" onclick="window.location.href='makeup.html'">
            Makeup Guide
        </div>

        <div class="service-box" onclick="window.location.href='hair.html'">
            Hair Guide
        </div>

        <div class="service-box" onclick="window.location.href='aesthetics.html'">
            Aesthetic Library
        </div>

        <div class="service-box" onclick="window.location.href='tryon.html'">
            Beauty Mirror
        </div>

    </div>

</body>
</html>
